<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR News Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html{
  overflow:hidden;
  height:100%;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

html::-webkit-scrollbar{
  display:none;
}

body{
  margin:0;
  padding:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#000 !important;
  color:#fff;
  overflow:hidden;
  height:100%;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

body::-webkit-scrollbar{
  display:none;
}

/* Root container for tabs/home */
.ar-news-home{
  position:relative;
  padding:20px;
  z-index:1 !important;
  max-width:600px;
  margin:0 auto;
}

.ar-title{
  font-size:22px;
  margin-bottom:16px;
  text-shadow:0 0 12px rgba(255,255,255,.5);
  letter-spacing:1px;
}

/* Generic button: minimal HUD style — glowing outline and text instead
   of a solid filled box, so it reads as light rather than a physical
   card. On a waveguide display, black is literally invisible, so leaning
   into "glowing outline" over "solid background" makes elements feel
   like they belong to the display rather than an opaque phone-app card. */
.open-btn{
  display:inline-block;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.4);
  padding:10px 18px;
  border-radius:6px;
  color:#fff;
  text-decoration:none;
  cursor:pointer;
  margin-top:10px;
  text-shadow:0 0 8px rgba(255,255,255,.5);
  transition:background .2s ease, box-shadow .2s ease, transform .2s ease;
}

.open-btn:hover{
  background:rgba(255,255,255,.08);
}

.keyboard-row{
  display:flex;
  width:100%;
  gap:6px;
  margin-bottom:6px;
}

.key-btn{
  flex:1;
  padding:12px 0;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.25);
  font-size:15px;
  background:rgba(255,255,255,.03);
  color:#fff;
  text-align:center;
  cursor:pointer;
  user-select:none;
  min-height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-shadow:0 0 6px rgba(255,255,255,.4);
  transition:background .15s ease, box-shadow .15s ease;
}

.key-btn:active{
  background:rgba(255,255,255,.1);
}

.focusable:focus{
  outline:none;
  border-color:#00d4ff;
  box-shadow:0 0 18px rgba(0,212,255,.65);
  background:rgba(0,212,255,.08);
}

/* Trending Bar */
.trending-bar{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.25);
  padding:12px 16px;
  border-radius:8px;
  margin-bottom:20px;
  font-size:16px;
  color:#fff;
  cursor:pointer;
  text-shadow:0 0 8px rgba(255,255,255,.4);
  transition:opacity .3s ease, transform .3s ease;
}

.trending-bar.update{
  opacity:0;
  transform:translateY(-6px);
}

/* Breaking News Alert */
.breaking-alert{
  background:rgba(139,0,0,.35);
  border:1px solid #ff4444;
  padding:14px 18px;
  border-radius:10px;
  margin-bottom:20px;
  font-size:18px;
  color:#fff;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  text-shadow:0 0 10px rgba(255,80,80,.8);
  animation:pulse 1.4s infinite ease-in-out;
}

@keyframes pulse{
  0%{transform:scale(1); opacity:1;}
  50%{transform:scale(1.03); opacity:.55;}
  100%{transform:scale(1); opacity:1;}
}

.breaking-alert::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,80,80,.35), transparent 70%);
  animation:glow 2.2s infinite ease-in-out;
  pointer-events:none;
}

@keyframes glow{
  0%{opacity:.2;}
  50%{opacity:.45;}
  100%{opacity:.2;}
}

.breaking-alert.critical{
  animation:shake .25s infinite;
}

@keyframes shake{
  0%{transform:translateX(0);}
  50%{transform:translateX(2px);}
  100%{transform:translateX(0);}
}

/* Category "constellation" — an arc of tiles rather than a flat grid,
   each with a diagonal corner-bracket frame (sci-fi HUD targeting-reticle
   style) instead of a full boxy border. Focused tiles brighten and scale
   up; everything else dims and softens slightly, via :has() — a real
   sense of foreground/background depth rather than a flat list. */
.carousel{
  position:relative;
  height:230px;
  margin:0 auto 8px;
  overflow:hidden;
  perspective:1000px;
}

.carousel-hint{
  text-align:center;
  font-size:13px;
  color:rgba(255,255,255,.5);
  margin:0 0 10px;
}

.carousel-card{
  position:absolute;
  top:0;
  left:50%;
  width:150px;
  height:210px;
  border-radius:18px;
  padding:20px 14px;
  box-sizing:border-box;
  text-align:center;
  color:#fff;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  transform-style:preserve-3d;
  backface-visibility:hidden;

  --tx:0px; --rot:0deg; --tz:0px; --scale:.7; --op:0; --blur:0px;
  transform:
    translateX(-50%)
    translateX(var(--tx))
    translateZ(var(--tz))
    rotateY(var(--rot))
    scale(var(--scale));
  opacity:var(--op);
  filter:blur(var(--blur));
  transition:transform .35s cubic-bezier(.22,.68,.36,1), opacity .35s ease, filter .35s ease;
  pointer-events:none;
}

.carousel-card .cc-icon{ font-size:36px; }
.carousel-card .cc-label{ font-size:17px; font-weight:600; text-shadow:0 0 10px rgba(255,255,255,.5); }
.carousel-card .cc-sub{ font-size:12px; color:rgba(255,255,255,.7); }

.carousel-card.cc-center{
  --tx:0px; --rot:0deg; --tz:0px; --scale:1; --op:1; --blur:0px;
  pointer-events:auto;
  z-index:3;
}
.carousel-card.cc-prev{
  --tx:-135px; --rot:42deg; --tz:-80px; --scale:.82; --op:.6; --blur:.5px;
  z-index:2;
}
.carousel-card.cc-next{
  --tx:135px; --rot:-42deg; --tz:-80px; --scale:.82; --op:.6; --blur:.5px;
  z-index:2;
}
.carousel-card.cc-far{
  --tx:0px; --rot:0deg; --tz:-150px; --scale:.6; --op:0;
}

.carousel.focusable:focus .carousel-card.cc-center{
  box-shadow:0 0 24px currentColor;
}

#categoryCarousel:focus{
  outline:none;
  border-color:transparent;
  box-shadow:none;
  background:transparent;
}

/* PANEL */
.ar-panel{
  position:fixed !important;
  inset:0 !important;
  background:rgba(0,0,0,0.75) !important;
  backdrop-filter:blur(6px);
  padding:20px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:999999 !important;
  pointer-events:auto !important;
}

.ar-panel.open{
  display:flex;
  animation:panelIn .25s ease;
}

@keyframes panelIn{
  0%{opacity:0; transform:scale(.97);}
  100%{opacity:1; transform:scale(1);}
}

.ar-panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  background:transparent !important;
  pointer-events:auto !important;
  max-width:600px;
  width:100%;
  margin-left:auto;
  margin-right:auto;
}

#panelClose{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.3);
  padding:8px 14px;
  border-radius:6px;
  color:#fff;
  cursor:pointer;
  text-shadow:0 0 6px rgba(255,255,255,.4);
}

/* SCROLL AREA */
.ar-scroll{
  flex:1;
  overflow:hidden;
  position:relative;
  background:transparent !important;
  pointer-events:auto !important;
  z-index:10000;
  max-width:600px;
  width:100%;
  margin:0 auto;
}

.ar-scroll-inner{
  position:absolute;
  left:0;right:0;top:0;
  width:100%;
  box-sizing:border-box;
  padding-bottom:40px;
  background:transparent !important;
  pointer-events:auto !important;
  touch-action:none !important;
  user-select:none;
  min-height:100%;
  z-index:10001;
}

/* ARTICLE */
.ar-article{
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,.15);
  background:transparent !important;
  transition:box-shadow .25s ease, opacity .25s ease, filter .25s ease;
  pointer-events:auto !important;
  z-index:10002;
}

.ar-article:hover,
.ar-article:focus-within{
  box-shadow:0 0 20px rgba(255,255,255,.15);
}

.ar-scroll-inner:has(.ar-article:focus-within) .ar-article:not(:focus-within){
  opacity:.55;
  filter:blur(.5px);
}

.open-btn:focus,
#panelClose:focus,
.ar-card:focus{
  outline:2px solid #fff;
  outline-offset:2px;
}

.img-placeholder{
  width:100%;
  height:160px;
  background:#333;
  border-radius:10px;
  animation:pulse 1.4s infinite;
}

@keyframes pulse{
  0%{opacity:.6}
  50%{opacity:1}
  100%{opacity:.6}
}

/* THEMES */
.theme-world .ar-panel-header,
.theme-world .ar-article,
.theme-world .ar-card {
  border-color: rgba(0,120,255,.6);
  box-shadow: 0 0 22px rgba(0,120,255,.35);
}

.theme-business .ar-panel-header,
.theme-business .ar-article,
.theme-business .ar-card {
  border-color: rgba(255,200,0,.6);
  box-shadow: 0 0 22px rgba(255,200,0,.35);
}

.theme-science .ar-panel-header,
.theme-science .ar-article,
.theme-science .ar-card {
  border-color: rgba(180,0,255,.6);
  box-shadow: 0 0 22px rgba(180,0,255,.35);
}

.theme-technology .ar-panel-header,
.theme-technology .ar-article,
.theme-technology .ar-card {
  border-color: rgba(0,255,255,.6);
  box-shadow: 0 0 22px rgba(0,255,255,.35);
}

.theme-entertainment .ar-panel-header,
.theme-entertainment .ar-article,
.theme-entertainment .ar-card {
  border-color: rgba(255,0,150,.6);
  box-shadow: 0 0 22px rgba(255,0,150,.35);
}

.theme-sports .ar-panel-header,
.theme-sports .ar-article,
.theme-sports .ar-card {
  border-color: rgba(0,255,120,.6);
  box-shadow: 0 0 22px rgba(0,255,120,.35);
}

.theme-health .ar-panel-header,
.theme-health .ar-article,
.theme-health .ar-card {
  border-color: rgba(0,255,200,.6);
  box-shadow: 0 0 22px rgba(0,255,200,.35);
}

.theme-politics .ar-panel-header,
.theme-politics .ar-article,
.theme-politics .ar-card {
  border-color: rgba(255,60,60,.6);
  box-shadow: 0 0 22px rgba(255,60,60,.35);
}
</style>
</head>

<body>

<div class="ar-news-home" id="newsHome">
  <h1 class="ar-title">News</h1>

  <div id="trendingBar" class="trending-bar focusable" tabindex="0" onclick="openTrending()">
    Trending Now: Loading...
  </div>

  <div id="breakingBar" class="breaking-alert focusable" tabindex="0" style="display:none;" onclick="openBreaking()">
    BREAKING NEWS: Loading...
  </div>

  <div class="search-box" style="margin-bottom:20px;">
    <div style="display:flex;gap:8px;">
      <input
        id="searchInput"
        type="text"
        placeholder="Tap to search…"
        readonly
        style="flex:1;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:#111;color:#fff;font-size:16px;"
      >
      <button class="open-btn" id="searchSubmit" style="margin-top:0;">Search</button>
    </div>

    <div id="weatherWidget" style="display:none;background:#111;border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:12px 16px;margin-top:10px;font-size:15px;">
      <span id="weatherText">Loading weather…</span>
      <div id="weatherCityRow" style="display:none;gap:8px;margin-top:10px;">
        <input
          id="weatherCityInput"
          type="text"
          placeholder="Enter city or ZIP…"
          readonly
          style="flex:1;padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:#0a0a0a;color:#fff;font-size:14px;"
        >
        <button class="open-btn" id="weatherCitySubmit" style="margin-top:0;">Set</button>
      </div>
    </div>

    <div id="keyboard" style="display:none;margin-top:10px;padding:10px;border-radius:14px;background:#111;border:1px solid rgba(255,255,255,.15);">
      <div class="keyboard-row" id="kbRowLetters0">
        <div class="key-btn focusable" tabindex="0" data-key="q">Q</div><div class="key-btn focusable" tabindex="0" data-key="w">W</div><div class="key-btn focusable" tabindex="0" data-key="e">E</div><div class="key-btn focusable" tabindex="0" data-key="r">R</div><div class="key-btn focusable" tabindex="0" data-key="t">T</div><div class="key-btn focusable" tabindex="0" data-key="y">Y</div><div class="key-btn focusable" tabindex="0" data-key="u">U</div><div class="key-btn focusable" tabindex="0" data-key="i">I</div><div class="key-btn focusable" tabindex="0" data-key="o">O</div><div class="key-btn focusable" tabindex="0" data-key="p">P</div>
      </div>
      <div class="keyboard-row" id="kbRowLetters1">
        <div class="key-btn focusable" tabindex="0" data-key="a">A</div><div class="key-btn focusable" tabindex="0" data-key="s">S</div><div class="key-btn focusable" tabindex="0" data-key="d">D</div><div class="key-btn focusable" tabindex="0" data-key="f">F</div><div class="key-btn focusable" tabindex="0" data-key="g">G</div><div class="key-btn focusable" tabindex="0" data-key="h">H</div><div class="key-btn focusable" tabindex="0" data-key="j">J</div><div class="key-btn focusable" tabindex="0" data-key="k">K</div><div class="key-btn focusable" tabindex="0" data-key="l">L</div>
      </div>
      <div class="keyboard-row" id="kbRowLetters2">
        <div class="key-btn focusable" tabindex="0" data-key="z">Z</div><div class="key-btn focusable" tabindex="0" data-key="x">X</div><div class="key-btn focusable" tabindex="0" data-key="c">C</div><div class="key-btn focusable" tabindex="0" data-key="v">V</div><div class="key-btn focusable" tabindex="0" data-key="b">B</div><div class="key-btn focusable" tabindex="0" data-key="n">N</div><div class="key-btn focusable" tabindex="0" data-key="m">M</div>
      </div>
      <div class="keyboard-row" id="kbRowNums0" style="display:none;">
        <div class="key-btn focusable" tabindex="0" data-key="1">1</div><div class="key-btn focusable" tabindex="0" data-key="2">2</div><div class="key-btn focusable" tabindex="0" data-key="3">3</div><div class="key-btn focusable" tabindex="0" data-key="4">4</div><div class="key-btn focusable" tabindex="0" data-key="5">5</div><div class="key-btn focusable" tabindex="0" data-key="6">6</div><div class="key-btn focusable" tabindex="0" data-key="7">7</div><div class="key-btn focusable" tabindex="0" data-key="8">8</div><div class="key-btn focusable" tabindex="0" data-key="9">9</div><div class="key-btn focusable" tabindex="0" data-key="0">0</div>
      </div>
      <div class="keyboard-row" id="kbRowNums1" style="display:none;">
        <div class="key-btn focusable" tabindex="0" data-key="!">!</div><div class="key-btn focusable" tabindex="0" data-key="?">?</div><div class="key-btn focusable" tabindex="0" data-key="-">-</div><div class="key-btn focusable" tabindex="0" data-key="'">'</div>
      </div>
      <div class="keyboard-row">
        <div class="key-btn focusable" tabindex="0" data-key="123" id="numToggleBtn" style="flex:1.2;">123</div>
        <div class="key-btn focusable" tabindex="0" data-key="SPACE" style="flex:2.4;">SPACE</div>
        <div class="key-btn focusable" tabindex="0" data-key="DELETE" style="flex:1.2;">DEL</div>
        <div class="key-btn focusable" tabindex="0" data-key="ENTER" style="flex:1.2;">GO</div>
        <div class="key-btn focusable" tabindex="0" data-key="BACK" style="flex:1.2;">← Back</div>

  </div>

  <div id="categoryCarousel" class="carousel focusable" tabindex="0"></div>
  <p class="carousel-hint">◄ ► to browse · enter to open</p>
</div>

<div class="ar-panel" id="newsPanel">
  <div class="ar-panel-header">
    <span id="panelTitle"></span>
    <button id="panelClose" onclick="handleBack()">✕</button>
  </div>

  <div class="ar-scroll" id="scrollArea">
    <div class="ar-scroll-inner" id="scrollInner"></div>
  </div>
</div>

<script>
const panel = document.getElementById('newsPanel');
const panelTitle = document.getElementById('panelTitle');
const scrollArea = document.getElementById('scrollArea');
const scrollInner = document.getElementById('scrollInner');

const CURRENTS_API_KEY = "TwVaFP-l5MuTOmKpE4OBVesLbEjPLu1PK66IJXfnvxBYzfGB";
/* Currents API has no CORS headers of its own, so requests go through
   a Cloudflare Worker proxy that adds Access-Control-Allow-Origin.
   Deploy currents-proxy-worker.js as its own Worker and put its URL here. */
const CURRENTS_BASE = "https://currents-proxy.mediastarr86.workers.dev";

/* Shared query filters: real news only (no discussion/articles),
   drop non-news sources like CVE trackers, 30 per page. */
const PAGE_SIZE = 20; // Free tier max page_size is 20
const EXCLUDED_DOMAINS = "vuldb.com";
const COMMON_FILTERS = `type=1&domain_not=${EXCLUDED_DOMAINS}&page_size=${PAGE_SIZE}`;

/* Currents sometimes returns the same story more than once (synced from
   multiple category feeds, or a straight re-publish). Dedupe by normalized
   title so lists don't show the same headline twice in a row. */
function dedupeArticles(list){
  const seen = new Set();
  const result = [];
  for (const a of list){
    const key = (a.title || '').trim().toLowerCase().replace(/\s+/g, ' ');
    if (key && seen.has(key)) continue;
    if (key) seen.add(key);
    result.push(a);
  }
  return result;
}

let activeCategory = null;
let trendingIndex = 0;
let trendingList = [];
let currentIndex = 0;
let currentList = [];
let breakingList = [];

/* Pagination state per view, so "Load More" knows what to fetch next */
let categoryUrlBase = '';
let categoryPage = 1;
let categoryLastCount = 0;

let trendingUrlBase = '';
let trendingPage = 1;
let trendingLastCount = 0;

let breakingUrlBase = '';
let breakingPage = 1;
let breakingLastCount = 0;

/* Back-navigation state: X goes back one level (article -> list -> closed)
   instead of always closing straight to the home tabs. */
let currentView = 'list'; // 'list' | 'article' | 'reader'
let listRenderer = null;  // whichever render*List function is currently active
let currentArticleRef = null; // article currently open, for reader -> article back step

function handleBack(){
  if (currentView === 'reader'){
    openArticleFull(currentArticleRef);
  } else if (currentView === 'article'){
    scrollInner.style.top = "0px";
    if (listRenderer) listRenderer();
  } else {
    closePanel();
  }
}

/* Map UI category to Currents category or search */
function isCategory(cat){
  return ['business','science','technology','entertainment','sports','health','politics'].includes(cat);
}

function openPanel(category){
  activeCategory = category;

  document.body.className = "";
  document.body.classList.add("theme-" + category);

  panel.classList.add('open');
  panelTitle.textContent = category.toUpperCase();
  scrollInner.innerHTML = '<p>Loading...</p>';
  scrollInner.style.top = "0px";

  if (category === 'world'){
    categoryUrlBase = `${CURRENTS_BASE}/v1/search?keywords=world&language=en&${COMMON_FILTERS}&apiKey=${CURRENTS_API_KEY}`;
  } else if (isCategory(category)){
    categoryUrlBase = `${CURRENTS_BASE}/v1/latest-news?category=${category}&language=en&${COMMON_FILTERS}&apiKey=${CURRENTS_API_KEY}`;
  } else {
    categoryUrlBase = `${CURRENTS_BASE}/v1/latest-news?language=en&${COMMON_FILTERS}&apiKey=${CURRENTS_API_KEY}`;
  }

  categoryPage = 1;
  fetchCategoryPage(1, false);
}

function openSearch(query){
  query = (query || '').trim();
  if (!query) return;

  activeCategory = null;
  document.body.className = "";

  panel.classList.add('open');
  panelTitle.textContent = 'SEARCH: ' + query.toUpperCase();
  scrollInner.innerHTML = '<p>Loading...</p>';
  scrollInner.style.top = "0px";

  categoryUrlBase = `${CURRENTS_BASE}/v1/search?keywords=${encodeURIComponent(query)}&language=en&${COMMON_FILTERS}&apiKey=${CURRENTS_API_KEY}`;
  categoryPage = 1;
  fetchCategoryPage(1, false);
}

/* Currents API has no "has video" filter, so this can't be a guaranteed
   video-only feed — it's a search leaning toward video-likely coverage
   (watch/clip/footage-style stories), combined with the video badge below
   so it's honest about what it actually found rather than promising more
   than the API can deliver. */
function openVideos(){
  activeCategory = null;
  document.body.className = "";

  panel.classList.add('open');
  panelTitle.textContent = 'VIDEOS';
  scrollInner.innerHTML = '<p>Loading...</p>';
  scrollInner.style.top = "0px";

  const videoQuery = encodeURIComponent('video OR clip OR footage OR watch');
  categoryUrlBase = `${CURRENTS_BASE}/v1/search?query=${videoQuery}&language=en&${COMMON_FILTERS}&apiKey=${CURRENTS_API_KEY}`;
  categoryPage = 1;
  fetchCategoryPage(1, false);
}

/* Local news: detects roughly where you are and filters Currents API's
   latest-news by country code. This is additive alongside World, not a
   replacement — World still shows broad international coverage exactly
   as before; this just adds one more way to slice the news. */
function openLocal(){
  activeCategory = null;
  document.body.className = "";

  panel.classList.add('open');
  panelTitle.textContent = 'LOCAL';
  scrollInner.innerHTML = '<p>Detecting your location…</p>';
  scrollInner.style.top = "0px";

  if (!navigator.geolocation){
    showLocalError("This browser doesn't support location detection.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=en`)
        .then(r => r.json())
        .then(data => {
          const countryCode = (data.countryCode || '').toLowerCase();
          if (!countryCode){
            showLocalError("Couldn't determine your country from your location.");
            return;
          }
          panelTitle.textContent = 'LOCAL: ' + (data.countryName || countryCode.toUpperCase());
          categoryUrlBase = `${CURRENTS_BASE}/v1/latest-news?country=${countryCode}&language=en&${COMMON_FILTERS}&apiKey=${CURRENTS_API_KEY}`;
          categoryPage = 1;

        })
        .catch(() => showLocalError("Couldn't look up your location's country."));
    },
    (err) => {
      const reasons = {
        1: "Location access was denied. Enable it in your browser/app permissions to use Local news.",
        2: "Your location couldn't be determined right now.",
        3: "Location detection timed out."
      };
      showLocalError(reasons[err.code] || "Couldn't get your location.");
    },
    { timeout: 10000 }
  );
}

/* Weather widget on the home screen, using Open-Meteo — free, no API key
   needed, and permissive CORS so it can be called directly from the
   browser without going through the Worker at all. Fails silently (widget
   just stays hidden) if location access is denied, rather than nagging. */
const WEATHER_CODES = {
  0: { day: '☀️', night: '🌙', label: 'Clear sky' },
  1: { day: '🌤️', night: '🌙', label: 'Mostly clear' },
  2: { day: '⛅', night: '☁️', label: 'Partly cloudy' },
  3: { day: '☁️', night: '☁️', label: 'Overcast' },
  45: { day: '🌫️', night: '🌫️', label: 'Fog' },
  48: { day: '🌫️', night: '🌫️', label: 'Fog' },
  51: { day: '🌦️', night: '🌦️', label: 'Light drizzle' },
  53: { day: '🌦️', night: '🌦️', label: 'Drizzle' },
  55: { day: '🌦️', night: '🌦️', label: 'Dense drizzle' },
  61: { day: '🌧️', night: '🌧️', label: 'Light rain' },
  63: { day: '🌧️', night: '🌧️', label: 'Rain' },
  65: { day: '🌧️', night: '🌧️', label: 'Heavy rain' },
  71: { day: '🌨️', night: '🌨️', label: 'Light snow' },
  73: { day: '🌨️', night: '🌨️', label: 'Snow' },
  75: { day: '🌨️', night: '🌨️', label: 'Heavy snow' },
  80: { day: '🌦️', night: '🌦️', label: 'Rain showers' },
  81: { day: '🌦️', night: '🌦️', label: 'Rain showers' },
  82: { day: '⛈️', night: '⛈️', label: 'Violent rain showers' },
  95: { day: '⛈️', night: '⛈️', label: 'Thunderstorm' },
  96: { day: '⛈️', night: '⛈️', label: 'Thunderstorm' },
  99: { day: '⛈️', night: '⛈️', label: 'Severe thunderstorm' }
};

const WEATHER_CITY_STORAGE_KEY = 'arNewsHub_weatherCity';

function loadWeather(){
  // Returning users: skip geolocation entirely if we already have a saved
  // city, avoiding the permission dance altogether.
  const saved = localStorage.getItem(WEATHER_CITY_STORAGE_KEY);
  if (saved){
    try {
      const { name, lat, lon } = JSON.parse(saved);
      fetchWeatherForCoords(lat, lon, name);
      return;
    } catch (e) { /* corrupted storage — fall through to geolocation */ }
  }

  if (!navigator.geolocation){
    showWeatherFallback("Location not supported by this browser. Enter your city instead.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      fetchWeatherForCoords(pos.coords.latitude, pos.coords.longitude);
    },
    (err) => {
      const reasons = {
        1: "Location permission denied. Enter your city instead.",
        2: "Position couldn't be determined. Enter your city instead.",
        3: "Location request timed out. Enter your city instead."
      };
      showWeatherFallback(reasons[err.code] || "Location error. Enter your city instead.");
    },
    { timeout: 10000 }
  );
}

function fetchWeatherForCoords(lat, lon, label){
  const widget = document.getElementById('weatherWidget');
  const text = document.getElementById('weatherText');

  const fields = 'temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,wind_speed_10m';
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=${fields}&temperature_unit=fahrenheit&wind_speed_unit=mph`)
    .then(r => r.json())
    .then(data => {
      const cw = data.current;
      if (!cw){
        showWeatherFallback("No weather data for this location. Try a different city.");
        return;
      }

      const code = WEATHER_CODES[cw.weather_code] || { day: '🌡️', night: '🌡️', label: 'Weather' };
      const icon = cw.is_day ? code.day : code.night;
      const temp = Math.round(cw.temperature_2m);
      const feelsLike = Math.round(cw.apparent_temperature);
      const humidity = Math.round(cw.relative_humidity_2m);
      const wind = Math.round(cw.wind_speed_10m);

      let line = `${icon} ${temp}°F`;
      if (Math.abs(feelsLike - temp) >= 2) line += ` (feels ${feelsLike}°)`;
      line += ` · ${humidity}% humidity · ${wind}mph wind`;
      if (cw.precipitation > 0) line += ` · ${cw.precipitation}in precip`;
      if (label) line += ` — ${label}`;

      text.textContent = line;
      widget.style.display = 'block';
      document.getElementById('weatherCityRow').style.display = 'none';
    })
    .catch((err) => {
      showWeatherFallback(`Weather request failed (${err.message || 'network error'}). Try a different city.`);
    });
}

function showWeatherFallback(message){
  const widget = document.getElementById('weatherWidget');
  const text = document.getElementById('weatherText');
  text.textContent = message;
  widget.style.display = 'block';
  document.getElementById('weatherCityRow').style.display = 'flex';
}

/* Manually-entered city/ZIP: geocode via Open-Meteo's free geocoding API
   (no key needed, same provider as the weather data itself), then save
   the result so future visits skip straight to it via loadWeather() above. */
function submitWeatherCity(){
  const cityInput = document.getElementById('weatherCityInput');
  const city = cityInput.value.trim();
  if (!city) return;

  const text = document.getElementById('weatherText');
  text.textContent = `Looking up "${city}"…`;

  fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`)
    .then(r => r.json())
    .then(data => {
      const result = data.results && data.results[0];
      if (!result){
        text.textContent = `Couldn't find "${city}". Try a different city or ZIP.`;
        return;
      }
      const label = [result.name, result.admin1, result.country].filter(Boolean).join(', ');
      localStorage.setItem(WEATHER_CITY_STORAGE_KEY, JSON.stringify({
        name: label,
        lat: result.latitude,
        lon: result.longitude
      }));
      fetchWeatherForCoords(result.latitude, result.longitude, label);
    })
    .catch(() => {
      text.textContent = `Couldn't look up "${city}". Try again.`;
    });
}

document.getElementById('weatherCitySubmit').onclick = submitWeatherCity;
document.getElementById('weatherCityInput').addEventListener('click', () => {
  openKeyboardFor(document.getElementById('weatherCityInput'), submitWeatherCity);
});
document.getElementById('weatherCityInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter'){
    e.preventDefault();
    openKeyboardFor(document.getElementById('weatherCityInput'), submitWeatherCity);
  }
});



/* Best-effort guess at whether an article likely has an embedded video,
   based on its title/description text. Not exact (Currents doesn't expose
   real video metadata), but gives a useful signal in list view before
   opening — and the reader itself will actually embed the video if one's
   found when you open the article. */
function isLikelyVideo(article){
  const text = ((article.title || '') + ' ' + (article.description || '')).toLowerCase();
  return /\bwatch\b|\bvideo\b|\bclip\b|\bfootage\b|\btrailer\b/.test(text);
}

function videoBadgeHtml(article){
  return isLikelyVideo(article)
    ? `<span style="display:inline-block;background:rgba(255,0,80,.25);border:1px solid rgba(255,0,80,.5);color:#fff;font-size:12px;padding:2px 8px;border-radius:12px;margin-bottom:6px;">🎥 Video</span><br>`
    : '';
}

function fetchCategoryPage(page, append){
  fetch(`${categoryUrlBase}&page_number=${page}`, { cache: "no-store" })
    .then(r => r.json())
    .then(data => {
      if (!data.news){
        throw new Error(data.msg || (data.details && JSON.stringify(data.details)) || 'Unknown API error');
      }

      const news = dedupeArticles(data.news);
      categoryLastCount = news.length;
      categoryPage = page;

      if (append){
        currentList = dedupeArticles(currentList.concat(news));
      } else {
        currentList = news;
        currentIndex = 0;
      }

      listRenderer = renderArticleList;
      renderArticleList();
    })
    .catch(err => {
      if (!append){
        scrollInner.innerHTML = `<p>Error loading news: ${err.message || err}</p>`;
      }
    });
}

function loadMoreCategory(){

}

function renderArticleList(){

    scrollInner.innerHTML = "<p>No articles found.</p>";
    return;
  }

function getArticleUrl(article){
  if (article.url) return article.url;
  const title = article.title || '';
  return 'https://news.google.com/search?q=' + encodeURIComponent(title);
}

function getArticleSource(article){
  try {
    return new URL(getArticleUrl(article)).hostname.replace(/^www\./, '');
  } catch (e) {
    return '';
  }
}

function openArticleIndex(i){
  currentIndex = i;
  openArticleFull(currentList[i]);
}

function openArticleFull(article){
  scrollInner.style.top = "0px";
  scrollInner.style.transition = "opacity .25s ease";
  scrollInner.style.opacity = 0;
  setTimeout(() => {
    scrollInner.style.opacity = 1;
  }, 60);

  const articleUrl = getArticleUrl(article);
  const source = getArticleSource(article);

  scrollInner.innerHTML = `
    ${article.image ? 
      `<img src="${article.image}" 
            style="width:100%;border-radius:10px;margin-bottom:20px;">`
      : ''
    }

    ${source ? `<p style="color:#8ecbff;font-size:14px;margin:0 0 8px;">${source}</p>` : ''}
    <h2>${article.title || ''}</h2>
    <p>${article.description || ''}</p>

    <button class="open-btn" id="readMoreBtn" tabindex="0">
      Read More
    </button>
  `;

  document.getElementById('readMoreBtn').onclick = () => {
    openArticleReader(articleUrl, article);
  };

  currentView = 'article';
  currentArticleRef = article;
  focusFirst();
}

/* This platform blocks both top-level navigation away from the app AND
   iframing third-party sites directly, so "Read More" fetches the article's
   HTML server-side through the Worker (same trick as the news API) and
   injects it via srcdoc — that's DOM content arriving through our own
   fetch(), not a live navigation/frame to another origin, so it isn't
   subject to the same block. The Worker strips all third-party <script>
   tags from extracted content, so allow-scripts here only ever runs our
   own trusted template (needed for the nested YouTube embed's player). */
function openArticleReader(url, article){
  scrollInner.style.top = "0px";
  readerScrollMode = false;
  scrollInner.innerHTML = `
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <button class="open-btn" id="readerBack" tabindex="0">← Back</button>
      <button class="open-btn" id="readerFontDown" tabindex="0" style="margin-top:0;">A−</button>
      <button class="open-btn" id="readerFontUp" tabindex="0" style="margin-top:0;">A+</button>
      <button class="open-btn" id="readerScrollToggle" tabindex="0" style="margin-top:0;">📖 Scroll</button>
      <button class="open-btn" id="ytPlayPauseBtn" tabindex="0" style="margin-top:0;display:none;">⏸ Pause</button>
      <button class="open-btn" id="ytMuteBtn" tabindex="0" style="margin-top:0;display:none;">🔊 Unmute</button>
    </div>
    <p id="readerStatus" style="margin-top:14px;">Loading article…</p>
    <iframe
      id="readerFrame"
      sandbox="allow-same-origin allow-scripts allow-popups"
      style="width:100%;height:65vh;border:none;border-radius:10px;margin-top:10px;background:#fff;display:none;"
    ></iframe>
  `;

  document.getElementById('readerBack').onclick = () => {
    openArticleFull(article);
  };
  document.getElementById('readerFontDown').onclick = () => adjustReaderFont(-2);
  document.getElementById('readerFontUp').onclick = () => adjustReaderFont(2);
  document.getElementById('readerScrollToggle').onclick = toggleReaderScrollMode;

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 25000);
  const status = document.getElementById('readerStatus');

  fetch(`${CURRENTS_BASE}/article?url=${encodeURIComponent(url)}`, { cache: "no-store", signal: controller.signal })
    .then(r => {
      if (status) status.textContent = `Loading article… (HTTP ${r.status})`;
      return r.text().then(html => ({ ok: r.ok, httpStatus: r.status, html }));
    })
    .then(({ ok, httpStatus, html }) => {
      clearTimeout(timeoutId);
      const frame = document.getElementById('readerFrame');

      if (!html || !html.trim()){
        if (status) status.textContent = `Empty response from Worker (HTTP ${httpStatus}). Nothing to show.`;
        return;
      }

      frame.srcdoc = html;
      frame.style.display = 'block';
      if (status) status.remove();

      // Links inside the reader content are real <a href> tags now.
      // Intercept taps on them and route through our own reader pipeline
      // instead of letting them attempt a raw cross-origin navigation
      // (which this platform blocks, same as the original Read More issue).
      frame.onload = () => {
        try {
          applyReaderFontSize();

          const linkEls = frame.contentDocument.querySelectorAll('a[href]');
          linkEls.forEach(a => {
            a.addEventListener('click', (e) => {
              e.preventDefault();
              const href = a.getAttribute('href');
              if (href) openArticleReader(href, article);
            });
          });

          // If the article has a YouTube video embed, show Play/Pause and
          // Mute controls up here in the outer page — buttons living inside
          // the srcdoc content weren't reachable by Up/Down navigation at
          // all, since that only cycles through the outer page's elements.
          const ytFrame = frame.contentDocument.getElementById('ytPlayer');
          if (ytFrame){
            setupYouTubeControls(ytFrame);
          }
        } catch (err) {
          // If cross-frame access is ever blocked, links/video controls
          // just won't be tappable — not fatal, the text still displays.
        }
      };
    })
    .catch(err => {
      clearTimeout(timeoutId);
      if (status){
        status.textContent = (err && err.name === 'AbortError')
          ? "This article took too long to load. Try Back and a different one."
          : `Couldn't load this article: ${err.message || err}`;
      }
    });

  currentView = 'reader';
  focusFirst();
}

function setupYouTubeControls(ytFrame){
  const playPauseBtn = document.getElementById('ytPlayPauseBtn');
  const muteBtn = document.getElementById('ytMuteBtn');
  if (!playPauseBtn || !muteBtn) return;

  let playing = true;
  let muted = true;

  function ytCmd(func){
    if (ytFrame && ytFrame.contentWindow){
      ytFrame.contentWindow.postMessage(JSON.stringify({ event: 'command', func, args: [] }), '*');
    }
  }

  playPauseBtn.style.display = 'inline-block';
  muteBtn.style.display = 'inline-block';

  playPauseBtn.onclick = () => {
    playing = !playing;
    ytCmd(playing ? 'playVideo' : 'pauseVideo');
    playPauseBtn.textContent = playing ? '⏸ Pause' : '▶ Play';
  };
  muteBtn.onclick = () => {
    muted = !muted;
    ytCmd(muted ? 'mute' : 'unMute');
    muteBtn.textContent = muted ? '🔊 Unmute' : '🔇 Mute';
  };
}

let readerFontSize = 19; // matches the default in renderReaderPage's own CSS

function applyReaderFontSize(){
  const frame = document.getElementById('readerFrame');
  if (!frame || !frame.contentDocument || !frame.contentDocument.body) return;
  frame.contentDocument.body.style.fontSize = readerFontSize + 'px';
}

function adjustReaderFont(delta){
  readerFontSize = Math.max(14, Math.min(32, readerFontSize + delta));
  applyReaderFontSize();
}

/* Swipe navigation */
let startX = 0;
let endX = 0;

scrollArea.onpointerdown = e => {
  startX = e.clientX;
};

scrollArea.onpointerup = e => {
  endX = e.clientX;
  const dx = endX - startX;

  if (dx > 80){
    if (currentIndex > 0){
      currentIndex--;
      openArticleFull(currentList[currentIndex]);
    }
  }

  if (dx < -80){
    if (currentIndex < currentList.length - 1){
      currentIndex++;
      openArticleFull(currentList[currentIndex]);
    }
  }
};

/* Momentum scroll */
let isScrolling = false;
let lastY = 0;
let velocity = 0;
let momentumFrame = null;

scrollArea.onpointerdown = e => {
  isScrolling = true;
  lastY = e.clientY;
  velocity = 0;
  cancelMomentum();
};

scrollArea.onpointermove = e => {
  if (!isScrolling) return;
  const dy = e.clientY - lastY;
  lastY = e.clientY;
  scrollInner.style.top = (scrollInner.offsetTop + dy) + 'px';
  velocity = dy;
};

scrollArea.onpointerup = e => {
  isScrolling = false;
  startMomentum();
};

function startMomentum(){
  const friction = 0.92;

  function momentum(){
    velocity *= friction;
    scrollInner.style.top = (scrollInner.offsetTop + velocity) + 'px';
    clampScroll();

    if (Math.abs(velocity) > 0.5){
      momentumFrame = requestAnimationFrame(momentum);
    }
  }

  momentum();
}

function cancelMomentum(){
  if (momentumFrame){
    cancelAnimationFrame(momentumFrame);
    momentumFrame = null;
  }
}

function clampScroll(){
  const maxScroll = 0;
  const minScroll = scrollArea.clientHeight - scrollInner.scrollHeight;

  let top = scrollInner.offsetTop;

  if (top > maxScroll) top = maxScroll;
  if (top < minScroll) top = minScroll;

  scrollInner.style.top = top + 'px';
}

function fetchBreaking(){

  breakingPage = 1;

function fetchBreakingPage(page, append){
  fetch(`${breakingUrlBase}&page_number=${page}`, { cache: "no-store" })
    .then(r => r.json())
    .then(data => {
      if (!data.news){
        throw new Error(data.msg || (data.details && JSON.stringify(data.details)) || 'Unknown API error');
      }

      const news = dedupeArticles(data.news);
      breakingLastCount = news.length;
      breakingPage = page;

      if (append){
        breakingList = dedupeArticles(breakingList.concat(news));
        renderBreakingList();
        return;
      }

      breakingList = news;
      const bar = document.getElementById("breakingBar");

      if (breakingList.length > 0){
        const headline = breakingList[0].title || '';
        bar.style.display = "block";
        bar.textContent = "BREAKING NEWS: " + headline;

      } else {
        bar.style.display = "none";

    .catch(err => {

        const bar = document.getElementById("breakingBar");

function openBreaking(){
  panel.classList.add('open');
  panelTitle.textContent = "BREAKING NEWS";
  scrollInner.style.top = "0px";
  listRenderer = renderBreakingList;
  renderBreakingList();
}

function renderBreakingList(){
  scrollInner.innerHTML = "";

  if (!breakingList.length){
    scrollInner.innerHTML = "<p>No breaking articles.</p>";
    return;
  }

  breakingList.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'ar-article';
    div.innerHTML = `
      ${videoBadgeHtml(a)}
      <h3>${a.title || ''}</h3>
      <p>${a.description || ''}</p>
      <button class="open-btn" onclick="openBreakingIndex(${i})">
        Open Article
      </button>
    `;
    scrollInner.appendChild(div);
  });

  if (breakingLastCount === PAGE_SIZE){
    const loadMoreDiv = document.createElement('div');
    loadMoreDiv.style.textAlign = 'center';
    loadMoreDiv.style.padding = '10px 0 20px';
    loadMoreDiv.innerHTML = `<button class="open-btn" onclick="loadMoreBreaking()">Load More</button>`;
    scrollInner.appendChild(loadMoreDiv);
  }

  currentView = 'list';
  focusFirst();
}

function openBreakingIndex(i){
  currentList = breakingList;
  currentIndex = i;
  openArticleFull(breakingList[i]);
}

/* Close panel */
function closePanel(){
  panel.classList.remove('open');
}

/* Neural Band input: keydown only (no pointer/touch events on glasses).
   Up/Down move focus between selectable buttons (X, each article, Read More);
   pressing Enter on a focused <button> activates it natively.
   Left/Right still step between articles when one is open. */
function getFocusable(){
  return Array.from(panel.querySelectorAll('button, a.open-btn')).filter(el => el.offsetParent !== null);
}

function focusStep(direction){
  const focusables = getFocusable();
  if (!focusables.length) return;

  let idx = focusables.indexOf(document.activeElement);
  idx = (idx === -1) ? 0 : (idx + direction + focusables.length) % focusables.length;

  const el = focusables[idx];
  el.focus({ preventScroll: true });
  revealFocused(el);
}

function revealFocused(el){
  const areaRect = scrollArea.getBoundingClientRect();
  const elRect = el.getBoundingClientRect();

  if (elRect.top < areaRect.top){
    scrollInner.style.top = (scrollInner.offsetTop + (areaRect.top - elRect.top) + 16) + 'px';
    clampScroll();
  } else if (elRect.bottom > areaRect.bottom){
    scrollInner.style.top = (scrollInner.offsetTop - (elRect.bottom - areaRect.bottom) - 16) + 'px';
    clampScroll();
  }
}

function focusFirst(){
  const focusables = getFocusable();
  if (focusables.length) focusables[0].focus({ preventScroll: true });
}

document.addEventListener('keydown', (e) => {
  if (!panel.classList.contains('open')) return;

  if (currentView === 'reader' && readerScrollMode && (e.key === 'ArrowDown' || e.key === 'ArrowUp')){
    e.preventDefault();
    scrollReader(e.key === 'ArrowDown' ? 60 : -60);
    return;
  }

  if (e.key === 'ArrowDown'){
    e.preventDefault();
    cancelMomentum();
    focusStep(1);
  } else if (e.key === 'ArrowUp'){
    e.preventDefault();
    cancelMomentum();
    focusStep(-1);
  } else if (e.key === 'ArrowRight'){
    e.preventDefault();
    if (currentView === 'reader'){
      focusStep(1);
    } else if (currentList.length && currentIndex < currentList.length - 1){
      currentIndex++;
      openArticleFull(currentList[currentIndex]);
    }
  } else if (e.key === 'ArrowLeft'){
    e.preventDefault();
    if (currentView === 'reader'){
      focusStep(-1);
    } else if (currentList.length && currentIndex > 0){
      currentIndex--;
      openArticleFull(currentList[currentIndex]);
    }
  } else if (e.key === 'Escape'){
    handleBack();
  }
});

let readerScrollMode = false;

function toggleReaderScrollMode(){
  readerScrollMode = !readerScrollMode;
  const btn = document.getElementById('readerScrollToggle');
  if (btn){
    btn.textContent = readerScrollMode ? '✓ Reading (tap to select buttons)' : '📖 Scroll';
  }
}

function scrollReader(amount){
  const frame = document.getElementById('readerFrame');
  if (!frame) return;
  try {
    frame.contentWindow.scrollBy(0, amount);
  } catch (err) {
    // Cross-origin content (shouldn't happen with srcdoc, but just in case)
  }
}

/* Text search on the home screen. There's no native OS keyboard on this
   platform (confirmed in Meta's own docs — every interactive element must
   be reached via Neural Band gestures / arrow keys + Enter). The working
   pattern, same one used elsewhere on this device, is a custom on-screen
   keyboard built from focusable buttons rather than relying on a real
   <input> to summon anything. The input itself is read-only; the keyboard
   below is what actually writes into it. */
document.getElementById('searchSubmit').onclick = () => {
  openSearch(document.getElementById('searchInput').value);
};

const keyboardEl = document.getElementById('keyboard');
const searchInputEl = document.getElementById('searchInput');
let showingNumRow = false;

// Generalized so more than one input can reuse the same on-screen keyboard
// (there's no native keyboard on this platform at all, so every text entry
// point needs this) — activeKeyboardInput tracks which field is being
// typed into, and activeKeyboardSubmit is what ENTER/GO should do for it.
let activeKeyboardInput = searchInputEl;
let activeKeyboardSubmit = () => openSearch(searchInputEl.value);

function openKeyboardFor(inputEl, onSubmit){
  activeKeyboardInput = inputEl;
  activeKeyboardSubmit = onSubmit;
  keyboardEl.style.display = 'block';
  const firstKey = keyboardEl.querySelector('.focusable');
  if (firstKey) firstKey.focus();
}

function openKeyboard(){
  openKeyboardFor(searchInputEl, () => openSearch(searchInputEl.value));
}
// Only a genuine tap or a deliberate Enter-while-focused opens the
// keyboard — binding this to the 'focus' event was too broad, since
// Down-navigation passing through the input on its way to the category
// grid below also fires 'focus', opening the keyboard unintentionally.
searchInputEl.addEventListener('click', openKeyboard);
searchInputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter'){
    e.preventDefault();
    openKeyboard();
  }
});

function handleKeyPress(key){
  if (key === 'DELETE'){
    activeKeyboardInput.value = activeKeyboardInput.value.slice(0, -1);
  } else if (key === 'SPACE'){
    activeKeyboardInput.value += ' ';
  } else if (key === 'ENTER'){
    activeKeyboardSubmit();
    keyboardEl.style.display = 'none';
  } else if (key === 'BACK'){
    keyboardEl.style.display = 'none';
  } else if (key === '123'){
    showingNumRow = !showingNumRow;
    document.getElementById('kbRowLetters0').style.display = showingNumRow ? 'none' : 'flex';
    document.getElementById('kbRowLetters1').style.display = showingNumRow ? 'none' : 'flex';
    document.getElementById('kbRowLetters2').style.display = showingNumRow ? 'none' : 'flex';
    document.getElementById('kbRowNums0').style.display = showingNumRow ? 'flex' : 'none';
    document.getElementById('kbRowNums1').style.display = showingNumRow ? 'flex' : 'none';
    document.getElementById('numToggleBtn').textContent = showingNumRow ? 'ABC' : '123';
  } else {
    activeKeyboardInput.value += key;
  }
}

document.querySelectorAll('#keyboard .key-btn').forEach(keyEl => {
  keyEl.addEventListener('click', () => handleKeyPress(keyEl.dataset.key));
  keyEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter'){
      e.preventDefault();
      handleKeyPress(keyEl.dataset.key);
    }
  });
});

/* 2D spatial navigation across the keyboard grid, since it's a real grid
   (not a flat list like the rest of the app) — Left/Right move within a
   row, Up/Down jump to the nearest key above/below by actual on-screen
   position rather than by a fixed row-width assumption. */
function moveKeyFocus(dx, dy){
  const keys = Array.from(document.querySelectorAll('#keyboard .focusable'))
    .filter(el => el.offsetParent !== null);
  if (!keys.length) return;

  let idx = keys.indexOf(document.activeElement);
  if (idx === -1){
    keys[0].focus();
    return;
  }

  if (dx !== 0){
    const newIdx = Math.max(0, Math.min(keys.length - 1, idx + dx));
    keys[newIdx].focus();
    return;
  }

  const cur = keys[idx].getBoundingClientRect();
  const curCenterX = (cur.left + cur.right) / 2;

  const candidates = keys.filter(k => {
    const r = k.getBoundingClientRect();
    return dy > 0 ? r.top > cur.top + 5 : r.top < cur.top - 5;
  });

  if (!candidates.length){
    // Nowhere left to go inside the keyboard grid.
    if (dy < 0){
      // Off the top row — exit upward to the Search button above.
      const searchBtn = document.getElementById('searchSubmit');
      if (searchBtn) searchBtn.focus();
    }
    return;
  }

  const targetTop = dy > 0
    ? Math.min(...candidates.map(k => k.getBoundingClientRect().top))
    : Math.max(...candidates.map(k => k.getBoundingClientRect().top));
  const rowCandidates = candidates.filter(k => Math.abs(k.getBoundingClientRect().top - targetTop) < 5);

  let best = rowCandidates[0];
  let bestDist = Infinity;
  rowCandidates.forEach(k => {
    const r = k.getBoundingClientRect();
    const dist = Math.abs((r.left + r.right) / 2 - curCenterX);
    if (dist < bestDist){ bestDist = dist; best = k; }
  });

  if (best) best.focus();
}

document.addEventListener('keydown', (e) => {
  if (keyboardEl.style.display === 'none') return;
  if (panel.classList.contains('open')) return; // keyboard only lives on the home screen
  if (!keyboardEl.contains(document.activeElement)) return; // focus has moved outside the keyboard — don't hijack

  if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight'){
    e.preventDefault();
    const dx = e.key === 'ArrowRight' ? 1 : e.key === 'ArrowLeft' ? -1 : 0;
    const dy = e.key === 'ArrowDown' ? 1 : e.key === 'ArrowUp' ? -1 : 0;
    moveKeyFocus(dx, dy);
  } else if (e.key === 'Escape'){
    keyboardEl.style.display = 'none';
  }
});

/* Home screen navigation — previously had none, so reaching it relied on
   whatever native fallback focus behavior the browser provides, one
   element at a time. This builds real spatial navigation (nearest element
   in the direction pressed, based on actual on-screen position — so
   Down from a left-column tile lands on the tile below it, not the one
   beside it) plus wrap-around: Down from the very last tile jumps straight
   to Trending Now at the top, and Up from Trending Now jumps straight to
   the last tile, so neither end is ever more than one press away. */
function getHomeFocusable(){
  const candidates = [
    document.getElementById('trendingBar'),
    document.getElementById('breakingBar'),
    document.getElementById('searchInput'),
    document.getElementById('searchSubmit'),
    document.getElementById('weatherCityInput'),
    document.getElementById('weatherCitySubmit'),
    document.getElementById('categoryCarousel')
  ];
  return candidates.filter(el => el && el.offsetParent !== null);
}

function homeFocusMove(dx, dy){
  const items = getHomeFocusable();
  if (!items.length) return;

  let idx = items.indexOf(document.activeElement);
  if (idx === -1){
    items[0].focus({ preventScroll: true });
    items[0].scrollIntoView({ block: 'nearest' });
    return;
  }

  const cur = items[idx].getBoundingClientRect();
  const curCenterX = (cur.left + cur.right) / 2;
  const curCenterY = (cur.top + cur.bottom) / 2;

  let best = null;
  let bestDist = Infinity;

  items.forEach(el => {
    if (el === items[idx]) return;
    const r = el.getBoundingClientRect();
    const centerX = (r.left + r.right) / 2;
    const centerY = (r.top + r.bottom) / 2;

    if (dy > 0 && centerY <= curCenterY + 5) return;
    if (dy < 0 && centerY >= curCenterY - 5) return;
    if (dy === 0 && dx > 0 && centerX <= curCenterX + 5) return;
    if (dy === 0 && dx < 0 && centerX >= curCenterX - 5) return;

    const dist = Math.hypot(centerX - curCenterX, centerY - curCenterY);
    if (dist < bestDist){ bestDist = dist; best = el; }
  });

  if (!best){
    // Nothing further in this direction — wrap to the opposite end.
    if (dy > 0) best = items[0];
    else if (dy < 0) best = items[items.length - 1];
  }

  if (best){
    best.focus({ preventScroll: true });
    best.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

document.getElementById('trendingBar').addEventListener('keydown', (e) => {
  if (e.key === 'Enter'){ e.preventDefault(); openTrending(); }
});
document.getElementById('breakingBar').addEventListener('keydown', (e) => {
  if (e.key === 'Enter'){ e.preventDefault(); openBreaking(); }
});

/* Category carousel: one centered card, neighbors peeking at the edges,
   Left/Right browses, Enter opens whichever is centered. Scales to any
   number of categories without redoing per-item layout math each time,
   unlike the previous fixed arc positions. */
const CAROUSEL_CATEGORIES = [
  { icon:'🌍', label:'World',         sub:'global coverage',   color:'#0078ff', action:() => openPanel('world') },
  { icon:'💼', label:'Business',      sub:'markets & industry',color:'#ffc800', action:() => openPanel('business') },
  { icon:'🔬', label:'Science',       sub:'discovery',         color:'#b400ff', action:() => openPanel('science') },
  { icon:'🖥️', label:'Technology',    sub:'tech news',         color:'#00e0e0', action:() => openPanel('technology') },
  { icon:'🎬', label:'Entertainment', sub:'film, tv & more',   color:'#ff0096', action:() => openPanel('entertainment') },
  { icon:'🏆', label:'Sports',        sub:'scores & recaps',   color:'#00d878', action:() => openPanel('sports') },
  { icon:'❤️', label:'Health',        sub:'wellness',          color:'#00c8a8', action:() => openPanel('health') },
  { icon:'🏛️', label:'Politics',      sub:'policy & elections',color:'#ff3c3c', action:() => openPanel('politics') },
  { icon:'🎥', label:'Videos',        sub:'video-first stories',color:'#ff8c00', action:() => openVideos() },
  { icon:'📍', label:'Local',         sub:'near you',          color:'#4da6ff', action:() => openLocal() }
];

let carouselIndex = 0;
const carouselEl = document.getElementById('categoryCarousel');

function renderCarousel(){
  carouselEl.innerHTML = '';
  const n = CAROUSEL_CATEGORIES.length;

  CAROUSEL_CATEGORIES.forEach((cat, i) => {
    let offset = i - carouselIndex;
    if (offset > n / 2) offset -= n;
    if (offset < -n / 2) offset += n;

    let posClass = 'cc-far';
    if (offset === 0) posClass = 'cc-center';
    else if (offset === -1) posClass = 'cc-prev';
    else if (offset === 1) posClass = 'cc-next';

    const card = document.createElement('div');
    card.className = `carousel-card ${posClass}`;
    card.style.color = cat.color;
    card.style.background = `${cat.color}22`;
    card.style.border = `1px solid ${cat.color}88`;
    card.innerHTML = `
      <div class="cc-icon">${cat.icon}</div>
      <div class="cc-label" style="color:#fff;">${cat.label}</div>
      <div class="cc-sub">${cat.sub}</div>
    `;
    if (offset === 0){
      card.onclick = () => cat.action();
    } else {
      const targetIndex = i;
      card.onclick = () => { carouselIndex = targetIndex; renderCarousel(); };
    }
    carouselEl.appendChild(card);
  });
}

carouselEl.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight'){
    e.preventDefault();
    carouselIndex = (carouselIndex + 1) % CAROUSEL_CATEGORIES.length;
    renderCarousel();
  } else if (e.key === 'ArrowLeft'){
    e.preventDefault();
    carouselIndex = (carouselIndex - 1 + CAROUSEL_CATEGORIES.length) % CAROUSEL_CATEGORIES.length;
    renderCarousel();
  } else if (e.key === 'Enter'){
    e.preventDefault();
    CAROUSEL_CATEGORIES[carouselIndex].action();
  }
});

renderCarousel();

document.addEventListener('keydown', (e) => {
  if (panel.classList.contains('open')) return;
  if (document.getElementById('keyboard').style.display !== 'none') return; // keyboard's own nav takes priority while open
  if (document.activeElement === carouselEl && (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'Enter')) return; // carousel's own handler takes it

  if (['ArrowDown', 'ArrowUp', 'ArrowLeft', 'ArrowRight'].includes(e.key)){
    e.preventDefault();
    const dx = e.key === 'ArrowRight' ? 1 : e.key === 'ArrowLeft' ? -1 : 0;
    const dy = e.key === 'ArrowDown' ? 1 : e.key === 'ArrowUp' ? -1 : 0;
    homeFocusMove(dx, dy);
  }
});

/* Init: fetch trending + breaking once, then auto-rotate the ticker */
fetchTrending();
fetchBreaking();
loadWeather();

setInterval(() => {
  if (trendingList.length > 1) updateTrendingBar();
}, 6000);

/* Keep news genuinely "latest" without the person having to do anything:
   re-fetch breaking news and trending periodically in the background, and
   silently refresh the currently open list's first page too — but only
   while someone is actually looking at a list, never while they're mid-
   article, so it never yanks content out from under them. */
setInterval(() => {
  fetchBreaking();
}, 3 * 60 * 1000);

setInterval(() => {
  fetchTrending();
}, 5 * 60 * 1000);

setInterval(() => {
  if (!panel.classList.contains('open') || currentView !== 'list') return;

  if (listRenderer === renderArticleList && categoryUrlBase){
    fetchCategoryPage(1, false);
  } else if (listRenderer === renderTrendingList){
    fetchTrending();
  } else if (listRenderer === renderBreakingList){
    fetchBreaking();
  }
}, 3 * 60 * 1000);
</script>
