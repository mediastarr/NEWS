<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AR News Hub</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#000;color:#fff;
  font-family:-apple-system,system-ui,sans-serif;
  overflow:hidden;
}

.ar-news-home{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  padding:20px;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(12px);
}

.ar-title{
  font-size:24px;
  margin-bottom:16px;
}

.ar-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

.ar-card{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  padding:20px;
  border-radius:14px;
  font-size:18px;
  text-align:center;
  cursor:pointer;
  transition:all .2s;
  color:#fff;
}

.ar-card:hover{
  background:rgba(255,255,255,.18);
  transform:translateY(-4px);
}
</style>
</head>

<body>

<div class="ar-news-home" id="newsHome">
  <h1 class="ar-title">News</h1>

  <div class="ar-grid">
    <button class="ar-card" data-cat="world">World</button>
    <button class="ar-card" data-cat="nation">Nation</button>
    <button class="ar-card" data-cat="business">Business</button>
    <button class="ar-card" data-cat="technology">Technology</button>
    <button class="ar-card" data-cat="science">Science</button>
    <button class="ar-card" data-cat="health">Health</button>
    <button class="ar-card" data-cat="sports">Sports</button>
    <button class="ar-card" data-cat="entertainment">Entertainment</button>
  </div>
</div>
<style>
.ar-panel{
  position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(18px);
  padding:20px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:500;
}

.ar-panel.open{display:flex;}

.ar-panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

#panelClose{
  background:#333;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
}

.ar-scroll{
  flex:1;
  overflow:hidden;
  position:relative;
}

.ar-scroll-inner{
  position:absolute;
  left:0;right:0;top:0;
  padding-bottom:40px;
}

.ar-article{
  padding:14px 0;
  border-bottom:1px solid #444;
}

.ar-article h3{
  font-size:18px;
  margin-bottom:6px;
}

.ar-article p{
  font-size:14px;
  color:#ccc;
}
</style>

<div class="ar-panel" id="newsPanel">
  <div class="ar-panel-header">
    <span id="panelTitle"></span>
    <button id="panelClose">✕</button>
  </div>

  <div class="ar-scroll" id="scrollArea">
    <div class="ar-scroll-inner" id="scrollInner"></div>
  </div>
</div>
<script>
const cards=document.querySelectorAll('.ar-card');
const panel=document.getElementById('newsPanel');
const panelTitle=document.getElementById('panelTitle');
const scrollArea=document.getElementById('scrollArea');
const scrollInner=document.getElementById('scrollInner');
const panelClose=document.getElementById('panelClose');

function freezeBackground(){
  document.getElementById('newsHome').style.pointerEvents='none';
  panel.style.pointerEvents='auto';
}

function unfreezeBackground(){
  document.getElementById('newsHome').style.pointerEvents='auto';
}
cards.forEach(card=>{
  card.addEventListener('pointerdown',()=>{
    const cat=card.dataset.cat;
    panelTitle.textContent=card.textContent;
    openPanel(cat);
  });
});

panelClose.addEventListener('pointerdown',()=>{
  panel.classList.remove('open');
  unfreezeBackground();
});

async function openPanel(category){
  panel.classList.add('open');
  freezeBackground();
  scrollInner.innerHTML='<p>Loading...</p>';

  try{
    const res=await fetch(
      `https://gnews.io/api/v4/top-headlines?category=${category}&lang=en&country=us&apikey=demo`
    );
    const data=await res.json();

    scrollInner.innerHTML='';

    if(!data.articles || data.articles.length===0){
      scrollInner.innerHTML='<p>No articles found.</p>';
      return;
    }

    data.articles.forEach(a=>{
      const div=document.createElement('div');
      div.className='ar-article';
      div.innerHTML=`
        <h3>${a.title}</h3>
        <p>${a.description||''}</p>
      `;
      div.addEventListener('pointerdown',()=>{
        openArticle(a);
      });
      scrollInner.appendChild(div);
    });

  }catch(e){
    scrollInner.innerHTML='<p>Error loading articles.</p>';
  }
}

function openArticle(article){
  scrollInner.innerHTML=`
    <h2>${article.title}</h2>
    <p>${article.content||article.description||''}</p>
  `;
}
let isScrolling=false;
let lastY=0;
let velocity=0;
let momentumFrame=null;

scrollArea.addEventListener('pointerdown',e=>{
  isScrolling=true;
  lastY=e.clientY;
  velocity=0;
  cancelMomentum();
});

scrollArea.addEventListener('pointermove',e=>{
  if(!isScrolling) return;

  const dy=e.clientY-lastY;
  lastY=e.clientY;

  scrollInner.style.top=(scrollInner.offsetTop+dy)+'px';

  velocity=dy; // track swipe speed
});

scrollArea.addEventListener('pointerup',()=>{
  isScrolling=false;
  startMomentum();
});

function startMomentum(){
  const friction=0.92;

  function momentum(){
    velocity*=friction;

    scrollInner.style.top=(scrollInner.offsetTop+velocity)+'px';

    if(Math.abs(velocity)>0.5){
      momentumFrame=requestAnimationFrame(momentum);
    }
  }

  momentum();
}

function cancelMomentum(){
  if(momentumFrame){
    cancelAnimationFrame(momentumFrame);
    momentumFrame=null;
  }
}
function clampScroll(){
  const maxScroll=0;
  const minScroll=scrollArea.clientHeight-scrollInner.scrollHeight;

  let top=scrollInner.offsetTop;

  if(top>maxScroll) top=maxScroll;
  if(top<minScroll) top=minScroll;

  scrollInner.style.top=top+'px';
}

scrollArea.addEventListener('pointermove',clampScroll);
scrollArea.addEventListener('pointerup',clampScroll);

function momentum(){
  velocity*=0.92;
  scrollInner.style.top=(scrollInner.offsetTop+velocity)+'px';
  clampScroll();

  if(Math.abs(velocity)>0.5){
    momentumFrame=requestAnimationFrame(momentum);
  }
}
let startY=0;

panel.addEventListener('pointerdown',e=>{
  startY=e.clientY;
});

panel.addEventListener('pointerup',e=>{
  const dy=e.clientY-startY;
  if(dy>80){
    panel.classList.remove('open');
    unfreezeBackground();
  }
});
</script>
</body>
</html>
