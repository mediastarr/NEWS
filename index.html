<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AR News Hub</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#000;color:#fff;
  font-family:-apple-system,system-ui,sans-serif;
  overflow:hidden;
}

.ar-news-home{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  padding:20px;
}

.ar-title{
  font-size:24px;
  margin-bottom:16px;
}

.ar-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

.ar-card{
  background:#222;
  border:1px solid #444;
  padding:20px;
  border-radius:14px;
  font-size:18px;
  text-align:center;
  cursor:pointer;
  color:#fff;
}
</style>
</head>

<body>

<div class="ar-news-home" id="newsHome">
  <h1 class="ar-title">News</h1>

  <div class="ar-grid">
    <button class="ar-card" data-cat="world" onpointerdown="openPanel('world')">World</button>
    <button class="ar-card" data-cat="nation" onpointerdown="openPanel('nation')">Nation</button>
    <button class="ar-card" data-cat="business" onpointerdown="openPanel('business')">Business</button>
    <button class="ar-card" data-cat="technology" onpointerdown="openPanel('technology')">Technology</button>
    <button class="ar-card" data-cat="science" onpointerdown="openPanel('science')">Science</button>
    <button class="ar-card" data-cat="health" onpointerdown="openPanel('health')">Health</button>
    <button class="ar-card" data-cat="sports" onpointerdown="openPanel('sports')">Sports</button>
    <button class="ar-card" data-cat="entertainment" onpointerdown="openPanel('entertainment')">Entertainment</button>
  </div>
</div>
<style>
.ar-panel{
  position:fixed;inset:0;
  background:#000;
  padding:20px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:500;
}

.ar-panel.open{display:flex;}

.ar-panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

#panelClose{
  background:#333;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
}

.ar-scroll{
  flex:1;
  overflow:hidden;
  position:relative;
}

.ar-scroll-inner{
  position:absolute;
  left:0;right:0;top:0;
  padding-bottom:40px;
}

.ar-article{
  padding:14px 0;
  border-bottom:1px solid #444;
}

.ar-article h3{
  font-size:18px;
  margin-bottom:6px;
}

.ar-article p{
  font-size:14px;
  color:#ccc;
}
</style>

<div class="ar-panel" id="newsPanel">
  <div class="ar-panel-header">
    <span id="panelTitle"></span>
    <button id="panelClose" onpointerdown="closePanel()">✕</button>
  </div>

  <div class="ar-scroll" id="scrollArea">
    <div class="ar-scroll-inner" id="scrollInner"></div>
  </div>
</div>
<script>
const panel=document.getElementById('newsPanel');
const panelTitle=document.getElementById('panelTitle');
const scrollArea=document.getElementById('scrollArea');
const scrollInner=document.getElementById('scrollInner');
function openPanel(category){
  panel.classList.add('open');
  panelTitle.textContent=category.toUpperCase();
  scrollInner.innerHTML='<p>Loading...</p>';

  fetch(`https://gnews.io/api/v4/top-headlines?category=${category}&lang=en&country=us&apikey=demo`)
    .then(r=>r.json())
    .then(data=>{
      scrollInner.innerHTML='';
      if(!data.articles){scrollInner.innerHTML='<p>No articles.</p>';return;}

      data.articles.forEach(a=>{
        const div=document.createElement('div');
        div.className='ar-article';
        div.innerHTML=`
          <h3>${a.title}</h3>
          <p>${a.description||''}</p>
        `;
        div.onpointerdown=()=>openArticle(a);
        scrollInner.appendChild(div);
      });
    });
}

function closePanel(){
  panel.classList.remove('open');
}

function openArticle(article){
  scrollInner.innerHTML=`
    <h2>${article.title}</h2>
    <p>${article.content||article.description||''}</p>
  `;
}
let isScrolling=false;
let lastY=0;
let velocity=0;
let momentumFrame=null;

scrollArea.onpointerdown=e=>{
  isScrolling=true;
  lastY=e.clientY;
  velocity=0;
  cancelMomentum();
};

scrollArea.onpointermove=e=>{
  if(!isScrolling) return;
  const dy=e.clientY-lastY;
  lastY=e.clientY;
  scrollInner.style.top=(scrollInner.offsetTop+dy)+'px';
  velocity=dy;
};

scrollArea.onpointerup=e=>{
  isScrolling=false;
  startMomentum();
};

function startMomentum(){
  const friction=0.92;

  function momentum(){
    velocity*=friction;
    scrollInner.style.top=(scrollInner.offsetTop+velocity)+'px';
    clampScroll();

    if(Math.abs(velocity)>0.5){
      momentumFrame=requestAnimationFrame(momentum);
    }
  }

  momentum();
}

function cancelMomentum(){
  if(momentumFrame){
    cancelAnimationFrame(momentumFrame);
    momentumFrame=null;
  }
}
function clampScroll(){
  const maxScroll=0;
  const minScroll=scrollArea.clientHeight-scrollInner.scrollHeight;

  let top=scrollInner.offsetTop;

  if(top>maxScroll) top=maxScroll;
  if(top<minScroll) top=minScroll;

  scrollInner.style.top=top+'px';
}

scrollArea.onpointermove=()=>{
  if(isScrolling) clampScroll();
};
scrollArea.onpointerup=clampScroll;
let startY=0;

panel.onpointerdown=e=>{
  startY=e.clientY;
};

panel.onpointerup=e=>{
  const dy=e.clientY-startY;
  if(dy>80){
    closePanel();
  }
};
</script>
</body>
</html>
