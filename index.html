<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR News Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  padding:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#000 !important;
  color:#fff;
  overflow:hidden;
}

/* Root container for tabs/home */
.ar-news-home{
  position:relative;
  padding:20px;
  z-index:1 !important;
}

.ar-title{
  font-size:24px;
  margin-bottom:16px;
}

/* Generic button style */
.open-btn{
  background:#444;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  margin-top:10px;
}

/* Trending Bar */
.trending-bar{
  background:#111;
  border:1px solid #333;
  padding:12px 16px;
  border-radius:10px;
  margin-bottom:20px;
  font-size:16px;
  color:#fff;
  cursor:pointer;
  transition:opacity .3s ease, transform .3s ease;
}

.trending-bar.update{
  opacity:0;
  transform:translateY(-6px);
}

/* Breaking News Alert */
.breaking-alert{
  background:#8b0000;
  border:2px solid #ff4444;
  padding:14px 18px;
  border-radius:12px;
  margin-bottom:20px;
  font-size:18px;
  color:#fff;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  animation:pulse 1.4s infinite ease-in-out;
}

@keyframes pulse{
  0%{transform:scale(1); opacity:1;}
  50%{transform:scale(1.03); opacity:.55;}
  100%{transform:scale(1); opacity:1;}
}

.breaking-alert::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,80,80,.35), transparent 70%);
  animation:glow 2.2s infinite ease-in-out;
  pointer-events:none;
}

@keyframes glow{
  0%{opacity:.2;}
  50%{opacity:.45;}
  100%{opacity:.2;}
}

.breaking-alert.critical{
  animation:shake .25s infinite;
}

@keyframes shake{
  0%{transform:translateX(0);}
  50%{transform:translateX(2px);}
  100%{transform:translateX(0);}
}

/* Category Grid */
.ar-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

.ar-card{
  background:transparent !important;
  border:1px solid rgba(255,255,255,.25);
  padding:20px;
  border-radius:14px;
  font-size:18px;
  text-align:center;
  cursor:pointer;
  color:#fff;
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  transform-style:preserve-3d;
}

/* PANEL */
.ar-panel{
  position:fixed !important;
  inset:0 !important;
  background:rgba(0,0,0,0.75) !important;
  backdrop-filter:blur(6px);
  padding:20px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:999999 !important;
  pointer-events:auto !important;
}

.ar-panel.open{display:flex;}

.ar-panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  background:transparent !important;
  pointer-events:auto !important;
}

#panelClose{
  background:#333;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
}

/* SCROLL AREA */
.ar-scroll{
  flex:1;
  overflow:hidden;
  position:relative;
  background:transparent !important;
  pointer-events:auto !important;
  z-index:10000;
}

.ar-scroll-inner{
  position:absolute;
  left:0;right:0;top:0;
  width:100%;
  box-sizing:border-box;
  padding-bottom:40px;
  background:transparent !important;
  pointer-events:auto !important;
  touch-action:none !important;
  user-select:none;
  min-height:100%;
  z-index:10001;
}

/* ARTICLE */
.ar-article{
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,.15);
  background:transparent !important;
  transform-style:preserve-3d;
  transition:transform .25s ease, box-shadow .25s ease;
  pointer-events:auto !important;
  z-index:10002;
}

.ar-article:hover{
  transform:translateZ(20px) scale(1.02);
  box-shadow:0 10px 20px rgba(0,0,0,.4);
}

.img-placeholder{
  width:100%;
  height:160px;
  background:#333;
  border-radius:10px;
  animation:pulse 1.4s infinite;
}

@keyframes pulse{
  0%{opacity:.6}
  50%{opacity:1}
  100%{opacity:.6}
}

/* THEMES */
.theme-world .ar-panel-header,
.theme-world .ar-article,
.theme-world .ar-card {
  border-color: rgba(0,120,255,.6);
  box-shadow: 0 0 22px rgba(0,120,255,.35);
}

.theme-business .ar-panel-header,
.theme-business .ar-article,
.theme-business .ar-card {
  border-color: rgba(255,200,0,.6);
  box-shadow: 0 0 22px rgba(255,200,0,.35);
}

.theme-science .ar-panel-header,
.theme-science .ar-article,
.theme-science .ar-card {
  border-color: rgba(180,0,255,.6);
  box-shadow: 0 0 22px rgba(180,0,255,.35);
}

.theme-technology .ar-panel-header,
.theme-technology .ar-article,
.theme-technology .ar-card {
  border-color: rgba(0,255,255,.6);
  box-shadow: 0 0 22px rgba(0,255,255,.35);
}

.theme-entertainment .ar-panel-header,
.theme-entertainment .ar-article,
.theme-entertainment .ar-card {
  border-color: rgba(255,0,150,.6);
  box-shadow: 0 0 22px rgba(255,0,150,.35);
}

.theme-sports .ar-panel-header,
.theme-sports .ar-article,
.theme-sports .ar-card {
  border-color: rgba(0,255,120,.6);
  box-shadow: 0 0 22px rgba(0,255,120,.35);
}

.theme-health .ar-panel-header,
.theme-health .ar-article,
.theme-health .ar-card {
  border-color: rgba(0,255,200,.6);
  box-shadow: 0 0 22px rgba(0,255,200,.35);
}

.theme-politics .ar-panel-header,
.theme-politics .ar-article,
.theme-politics .ar-card {
  border-color: rgba(255,60,60,.6);
  box-shadow: 0 0 22px rgba(255,60,60,.35);
}
</style>
</head>

<body>

<div class="ar-news-home" id="newsHome">
  <h1 class="ar-title">News</h1>

  <div id="trendingBar" class="trending-bar" onclick="openTrending()">
    Trending Now: Loading...
  </div>

  <div id="breakingBar" class="breaking-alert" style="display:none;" onclick="openBreaking()">
    BREAKING NEWS: Loading...
  </div>

  <div class="ar-grid">
    <button class="ar-card" onclick="openPanel('world')">🌍 World</button>
    <button class="ar-card" onclick="openPanel('business')">💼 Business</button>
    <button class="ar-card" onclick="openPanel('science')">🔬 Science</button>
    <button class="ar-card" onclick="openPanel('technology')">🖥️ Technology</button>
    <button class="ar-card" onclick="openPanel('entertainment')">🎬 Entertainment</button>
    <button class="ar-card" onclick="openPanel('sports')">🏆 Sports</button>
    <button class="ar-card" onclick="openPanel('health')">❤️ Health</button>
    <button class="ar-card" onclick="openPanel('politics')">🏛️ Politics</button>
  </div>
</div>

<div class="ar-panel" id="newsPanel">
  <div class="ar-panel-header">
    <span id="panelTitle"></span>
    <button id="panelClose" onclick="closePanel()">✕</button>
  </div>

  <div class="ar-scroll" id="scrollArea">
    <div class="ar-scroll-inner" id="scrollInner"></div>
  </div>
</div>

<script>
const panel = document.getElementById('newsPanel');
const panelTitle = document.getElementById('panelTitle');
const scrollArea = document.getElementById('scrollArea');
const scrollInner = document.getElementById('scrollInner');

const CURRENTS_API_KEY = "TwVaFP-l5MuTOmKpE4OBVesLbEjPLu1PK66IJXfnvxBYzfGB";
/* Currents API has no CORS headers of its own, so requests go through
   a Cloudflare Worker proxy that adds Access-Control-Allow-Origin.
   Deploy currents-proxy-worker.js as its own Worker and put its URL here. */
const CURRENTS_BASE = "https://currents-proxy.mediastarr86.workers.dev";

let activeCategory = null;
let trendingIndex = 0;
let trendingList = [];
let currentIndex = 0;
let currentList = [];
let breakingList = [];

/* Map UI category to Currents category or search */
function isCategory(cat){
  return ['business','science','technology','entertainment','sports','health','politics'].includes(cat);
}

function openPanel(category){
  activeCategory = category;

  document.body.className = "";
  document.body.classList.add("theme-" + category);

  panel.classList.add('open');
  panelTitle.textContent = category.toUpperCase();
  scrollInner.innerHTML = '<p>Loading...</p>';
  scrollInner.style.top = "0px";

  let url;
  if (category === 'world'){
    url = `${CURRENTS_BASE}/v1/search?keywords=world&language=en&apiKey=${CURRENTS_API_KEY}`;
  } else if (isCategory(category)){
    url = `${CURRENTS_BASE}/v1/latest-news?category=${category}&language=en&apiKey=${CURRENTS_API_KEY}`;
  } else {
    url = `${CURRENTS_BASE}/v1/latest-news?language=en&apiKey=${CURRENTS_API_KEY}`;
  }

  fetch(url)
    .then(r => r.json())
    .then(data => {
      currentList = data.news || [];
      currentIndex = 0;
      renderArticleList();
    })
    .catch(err => {
      scrollInner.innerHTML = `<p>Error loading news: ${err}</p>`;
    });
}

function renderArticleList(){
  scrollInner.innerHTML = "";

  if (!currentList.length){
    scrollInner.innerHTML = "<p>No articles found.</p>";
    return;
  }

  currentList.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'ar-article';
    div.setAttribute("data-index", i);

    const imgHtml = a.image
      ? `<img 
           src="${a.image}" 
           loading="lazy"
           style="width:100%;border-radius:10px;opacity:0;transition:opacity .4s;"
           onload="this.style.opacity=1"
         >`
      : `<div class="img-placeholder"></div>`;

    div.innerHTML = `
      <div class="img-wrap">
        ${imgHtml}
      </div>

      <h3>${a.title || ''}</h3>
      <p>${a.description || ''}</p>

      <button class="open-btn" onclick="openArticleIndex(${i})">
        Open Article
      </button>
    `;

    scrollInner.appendChild(div);
  });
}

function getArticleUrl(article){
  if (article.url) return article.url;
  const title = article.title || '';
  return 'https://news.google.com/search?q=' + encodeURIComponent(title);
}

function openArticleIndex(i){
  currentIndex = i;
  openArticleFull(currentList[i]);
}

function openArticleFull(article){
  scrollInner.style.transition = "opacity .25s ease";
  scrollInner.style.opacity = 0;
  setTimeout(() => {
    scrollInner.style.opacity = 1;
  }, 60);

  const articleUrl = getArticleUrl(article);

  scrollInner.innerHTML = `
    ${article.image ? 
      `<img src="${article.image}" 
            style="width:100%;border-radius:10px;margin-bottom:20px;">`
      : ''
    }

    <h2>${article.title || ''}</h2>
    <p>${article.description || ''}</p>

    <button class="open-btn" id="readMoreBtn" tabindex="0">
      Read More
    </button>
  `;

  document.getElementById('readMoreBtn').onclick = () => {
    window.location.href = articleUrl;
  };
}

/* Swipe navigation */
let startX = 0;
let endX = 0;

scrollArea.onpointerdown = e => {
  startX = e.clientX;
};

scrollArea.onpointerup = e => {
  endX = e.clientX;
  const dx = endX - startX;

  if (dx > 80){
    if (currentIndex > 0){
      currentIndex--;
      openArticleFull(currentList[currentIndex]);
    }
  }

  if (dx < -80){
    if (currentIndex < currentList.length - 1){
      currentIndex++;
      openArticleFull(currentList[currentIndex]);
    }
  }
};

/* Momentum scroll */
let isScrolling = false;
let lastY = 0;
let velocity = 0;
let momentumFrame = null;

scrollArea.onpointerdown = e => {
  isScrolling = true;
  lastY = e.clientY;
  velocity = 0;
  cancelMomentum();
};

scrollArea.onpointermove = e => {
  if (!isScrolling) return;
  const dy = e.clientY - lastY;
  lastY = e.clientY;
  scrollInner.style.top = (scrollInner.offsetTop + dy) + 'px';
  velocity = dy;
};

scrollArea.onpointerup = e => {
  isScrolling = false;
  startMomentum();
};

function startMomentum(){
  const friction = 0.92;

  function momentum(){
    velocity *= friction;
    scrollInner.style.top = (scrollInner.offsetTop + velocity) + 'px';
    clampScroll();

    if (Math.abs(velocity) > 0.5){
      momentumFrame = requestAnimationFrame(momentum);
    }
  }

  momentum();
}

function cancelMomentum(){
  if (momentumFrame){
    cancelAnimationFrame(momentumFrame);
    momentumFrame = null;
  }
}

function clampScroll(){
  const maxScroll = 0;
  const minScroll = scrollArea.clientHeight - scrollInner.scrollHeight;

  let top = scrollInner.offsetTop;

  if (top > maxScroll) top = maxScroll;
  if (top < minScroll) top = minScroll;

  scrollInner.style.top = top + 'px';
}

/* Trending using Currents search */
function fetchTrending(){
  fetch(`${CURRENTS_BASE}/v1/search?keywords=news&language=en&apiKey=${CURRENTS_API_KEY}`)
    .then(r => r.json())
    .then(data => {
      trendingList = data.news || [];
      if(trendingList.length > 0){
        updateTrendingBar();
      } else {
        document.getElementById("trendingBar").textContent = "Trending: no data";
      }
    })
    .catch(err => {
      document.getElementById("trendingBar").textContent = "Trending: error";
    });
}

function updateTrendingBar(){
  const bar = document.getElementById("trendingBar");
  if (!trendingList.length) return;

  bar.classList.add("update");

  setTimeout(() => {
    const item = trendingList[trendingIndex];
    trendingIndex = (trendingIndex + 1) % trendingList.length;

    bar.textContent = "Trending Now: " + (item.title || '');
    bar.classList.remove("update");
  }, 300);
}

function openTrending(){
  panel.classList.add('open');
  panelTitle.textContent = "TRENDING";
  scrollInner.innerHTML = "";
  scrollInner.style.top = "0px";

  if (!trendingList.length){
    scrollInner.innerHTML = "<p>No trending articles.</p>";
    return;
  }

  trendingList.forEach(a => {
    const div = document.createElement('div');
    div.className = 'ar-article';
    div.innerHTML = `
      <h3>${a.title || ''}</h3>
      <p>${a.description || ''}</p>
      <button class="open-btn" onclick="openArticleFull(${JSON.stringify(a).replace(/"/g,'&quot;')})">
        Open Article
      </button>
    `;
    scrollInner.appendChild(div);
  });
}

/* Breaking using Currents search */
function fetchBreaking(){
  fetch(`${CURRENTS_BASE}/v1/search?keywords=breaking&language=en&apiKey=${CURRENTS_API_KEY}`)
    .then(r => r.json())
    .then(data => {
      breakingList = data.news || [];
      const bar = document.getElementById("breakingBar");

      if (breakingList.length > 0){
        const headline = breakingList[0].title || '';
        bar.style.display = "block";
        bar.textContent = "BREAKING NEWS: " + headline;

        const lower = headline.toLowerCase();
        bar.classList.remove("critical");

        if (lower.includes("urgent") || lower.includes("alert")){
          bar.classList.add("critical");
        }
      } else {
        bar.style.display = "none";
      }
    })
    .catch(err => {
      const bar = document.getElementById("breakingBar");
      bar.style.display = "none";
    });
}

function openBreaking(){
  panel.classList.add('open');
  panelTitle.textContent = "BREAKING NEWS";
  scrollInner.innerHTML = "";
  scrollInner.style.top = "0px";

  if (!breakingList.length){
    scrollInner.innerHTML = "<p>No breaking articles.</p>";
    return;
  }

  breakingList.forEach(a => {
    const div = document.createElement('div');
    div.className = 'ar-article';
    div.innerHTML = `
      <h3>${a.title || ''}</h3>
      <p>${a.description || ''}</p>
      <button class="open-btn" onclick="openArticleFull(${JSON.stringify(a).replace(/"/g,'&quot;')})">
        Open Article
      </button>
    `;
    scrollInner.appendChild(div);
  });
}

/* Close panel */
function closePanel(){
  panel.classList.remove('open');
}

/* Neural Band input: keydown only (no pointer/touch events on glasses) */
const SCROLL_STEP = 60;

document.addEventListener('keydown', (e) => {
  if (!panel.classList.contains('open')) return;

  if (e.key === 'ArrowUp'){
    e.preventDefault();
    cancelMomentum();
    scrollInner.style.top = (scrollInner.offsetTop + SCROLL_STEP) + 'px';
    clampScroll();
  } else if (e.key === 'ArrowDown'){
    e.preventDefault();
    cancelMomentum();
    scrollInner.style.top = (scrollInner.offsetTop - SCROLL_STEP) + 'px';
    clampScroll();
  } else if (e.key === 'ArrowRight'){
    if (currentList.length && currentIndex < currentList.length - 1){
      currentIndex++;
      openArticleFull(currentList[currentIndex]);
    }
  } else if (e.key === 'ArrowLeft'){
    if (currentList.length && currentIndex > 0){
      currentIndex--;
      openArticleFull(currentList[currentIndex]);
    }
  } else if (e.key === 'Escape'){
    closePanel();
  }
});

/* Init: fetch trending + breaking once */
fetchTrending();
fetchBreaking();
</script>

</body>
</html>
