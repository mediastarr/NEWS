<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR News Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  padding:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#000 !important;
  color:#fff;
  overflow:hidden;
}

/* Root container for tabs/home */
.ar-news-home{
  position:relative;
  padding:20px;
  z-index:1 !important;
}

.ar-title{
  font-size:24px;
  margin-bottom:16px;
}

/* Generic button style */
.open-btn{
  display:inline-block;
  background:#444;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  color:#fff;
  text-decoration:none;
  cursor:pointer;
  margin-top:10px;
}

/* Trending Bar */
.trending-bar{
  background:#111;
  border:1px solid #333;
  padding:12px 16px;
  border-radius:10px;
  margin-bottom:20px;
  font-size:16px;
  color:#fff;
  cursor:pointer;
  transition:opacity .3s ease, transform .3s ease;
}

.trending-bar.update{
  opacity:0;
  transform:translateY(-6px);
}

/* Breaking News Alert */
.breaking-alert{
  background:#8b0000;
  border:2px solid #ff4444;
  padding:14px 18px;
  border-radius:12px;
  margin-bottom:20px;
  font-size:18px;
  color:#fff;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  animation:pulse 1.4s infinite ease-in-out;
}

@keyframes pulse{
  0%{transform:scale(1); opacity:1;}
  50%{transform:scale(1.03); opacity:.55;}
  100%{transform:scale(1); opacity:1;}
}

.breaking-alert::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,80,80,.35), transparent 70%);
  animation:glow 2.2s infinite ease-in-out;
  pointer-events:none;
}

@keyframes glow{
  0%{opacity:.2;}
  50%{opacity:.45;}
  100%{opacity:.2;}
}

.breaking-alert.critical{
  animation:shake .25s infinite;
}

@keyframes shake{
  0%{transform:translateX(0);}
  50%{transform:translateX(2px);}
  100%{transform:translateX(0);}
}

/* Category Grid */
.ar-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

.ar-card{
  background:transparent !important;
  border:1px solid rgba(255,255,255,.25);
  padding:20px;
  border-radius:14px;
  font-size:18px;
  text-align:center;
  cursor:pointer;
  color:#fff;
  transition:box-shadow .25s ease, border-color .25s ease;
}

/* PANEL */
.ar-panel{
  position:fixed !important;
  inset:0 !important;
  background:rgba(0,0,0,0.75) !important;
  backdrop-filter:blur(6px);
  padding:20px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:999999 !important;
  pointer-events:auto !important;
}

.ar-panel.open{display:flex;}

.ar-panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  background:transparent !important;
  pointer-events:auto !important;
}

#panelClose{
  background:#333;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
}

/* SCROLL AREA */
.ar-scroll{
  flex:1;
  overflow:hidden;
  position:relative;
  background:transparent !important;
  pointer-events:auto !important;
  z-index:10000;
}

.ar-scroll-inner{
  position:absolute;
  left:0;right:0;top:0;
  width:100%;
  box-sizing:border-box;
  padding-bottom:40px;
  background:transparent !important;
  pointer-events:auto !important;
  touch-action:none !important;
  user-select:none;
  min-height:100%;
  z-index:10001;
}

/* ARTICLE */
.ar-article{
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,.15);
  background:transparent !important;
  transition:box-shadow .25s ease, background-color .25s ease;
  pointer-events:auto !important;
  z-index:10002;
}

.ar-article:hover,
.ar-article:focus-within{
  box-shadow:0 10px 20px rgba(0,0,0,.4);
}

.open-btn:focus,
#panelClose:focus,
.ar-card:focus{
  outline:2px solid #fff;
  outline-offset:2px;
}

.img-placeholder{
  width:100%;
  height:160px;
  background:#333;
  border-radius:10px;
  animation:pulse 1.4s infinite;
}

@keyframes pulse{
  0%{opacity:.6}
  50%{opacity:1}
  100%{opacity:.6}
}

/* THEMES */
.theme-world .ar-panel-header,
.theme-world .ar-article,
.theme-world .ar-card {
  border-color: rgba(0,120,255,.6);
  box-shadow: 0 0 22px rgba(0,120,255,.35);
}

.theme-business .ar-panel-header,
.theme-business .ar-article,
.theme-business .ar-card {
  border-color: rgba(255,200,0,.6);
  box-shadow: 0 0 22px rgba(255,200,0,.35);
}

.theme-science .ar-panel-header,
.theme-science .ar-article,
.theme-science .ar-card {
  border-color: rgba(180,0,255,.6);
  box-shadow: 0 0 22px rgba(180,0,255,.35);
}

.theme-technology .ar-panel-header,
.theme-technology .ar-article,
.theme-technology .ar-card {
  border-color: rgba(0,255,255,.6);
  box-shadow: 0 0 22px rgba(0,255,255,.35);
}

.theme-entertainment .ar-panel-header,
.theme-entertainment .ar-article,
.theme-entertainment .ar-card {
  border-color: rgba(255,0,150,.6);
  box-shadow: 0 0 22px rgba(255,0,150,.35);
}

.theme-sports .ar-panel-header,
.theme-sports .ar-article,
.theme-sports .ar-card {
  border-color: rgba(0,255,120,.6);
  box-shadow: 0 0 22px rgba(0,255,120,.35);
}

.theme-health .ar-panel-header,
.theme-health .ar-article,
.theme-health .ar-card {
  border-color: rgba(0,255,200,.6);
  box-shadow: 0 0 22px rgba(0,255,200,.35);
}

.theme-politics .ar-panel-header,
.theme-politics .ar-article,
.theme-politics .ar-card {
  border-color: rgba(255,60,60,.6);
  box-shadow: 0 0 22px rgba(255,60,60,.35);
}
</style>
</head>

<body>

<div class="ar-news-home" id="newsHome">
  <h1 class="ar-title">News</h1>

  <div id="trendingBar" class="trending-bar" onclick="openTrending()">
    Trending Now: Loading...
  </div>

  <div id="breakingBar" class="breaking-alert" style="display:none;" onclick="openBreaking()">
    BREAKING NEWS: Loading...
  </div>

  <div class="ar-grid">
    <button class="ar-card" onclick="openPanel('world')">🌍 World</button>
    <button class="ar-card" onclick="openPanel('business')">💼 Business</button>
    <button class="ar-card" onclick="openPanel('science')">🔬 Science</button>
    <button class="ar-card" onclick="openPanel('technology')">🖥️ Technology</button>
    <button class="ar-card" onclick="openPanel('entertainment')">🎬 Entertainment</button>
    <button class="ar-card" onclick="openPanel('sports')">🏆 Sports</button>
    <button class="ar-card" onclick="openPanel('health')">❤️ Health</button>
    <button class="ar-card" onclick="openPanel('politics')">🏛️ Politics</button>
  </div>
</div>

<div class="ar-panel" id="newsPanel">
  <div class="ar-panel-header">
    <span id="panelTitle"></span>
    <button id="panelClose" onclick="handleBack()">✕</button>
  </div>

  <div class="ar-scroll" id="scrollArea">
    <div class="ar-scroll-inner" id="scrollInner"></div>
  </div>
</div>

<script>
const panel = document.getElementById('newsPanel');
const panelTitle = document.getElementById('panelTitle');
const scrollArea = document.getElementById('scrollArea');
const scrollInner = document.getElementById('scrollInner');

const CURRENTS_API_KEY = "TwVaFP-l5MuTOmKpE4OBVesLbEjPLu1PK66IJXfnvxBYzfGB";
/* Currents API has no CORS headers of its own, so requests go through
   a Cloudflare Worker proxy that adds Access-Control-Allow-Origin.
   Deploy currents-proxy-worker.js as its own Worker and put its URL here. */
const CURRENTS_BASE = "https://currents-proxy.mediastarr86.workers.dev";

/* Shared query filters: real news only (no discussion/articles),
   drop non-news sources like CVE trackers, 30 per page. */
const PAGE_SIZE = 20; // Free tier max page_size is 20
const EXCLUDED_DOMAINS = "vuldb.com";
const COMMON_FILTERS = `type=1&domain_not=${EXCLUDED_DOMAINS}&page_size=${PAGE_SIZE}`;

let activeCategory = null;
let trendingIndex = 0;
let trendingList = [];
let currentIndex = 0;
let currentList = [];
let breakingList = [];

/* Pagination state per view, so "Load More" knows what to fetch next */
let categoryUrlBase = '';
let categoryPage = 1;
let categoryLastCount = 0;

let trendingUrlBase = '';
let trendingPage = 1;
let trendingLastCount = 0;

let breakingUrlBase = '';
let breakingPage = 1;
let breakingLastCount = 0;

/* Back-navigation state: X goes back one level (article -> list -> closed)
   instead of always closing straight to the home tabs. */
let currentView = 'list'; // 'list' | 'article' | 'reader'
let listRenderer = null;  // whichever render*List function is currently active
let currentArticleRef = null; // article currently open, for reader -> article back step

function handleBack(){
  if (currentView === 'reader'){
    openArticleFull(currentArticleRef);
  } else if (currentView === 'article'){
    scrollInner.style.top = "0px";
    if (listRenderer) listRenderer();
  } else {
    closePanel();
  }
}

/* Map UI category to Currents category or search */
function isCategory(cat){
  return ['business','science','technology','entertainment','sports','health','politics'].includes(cat);
}

function openPanel(category){
  activeCategory = category;

  document.body.className = "";
  document.body.classList.add("theme-" + category);

  panel.classList.add('open');
  panelTitle.textContent = category.toUpperCase();
  scrollInner.innerHTML = '<p>Loading...</p>';
  scrollInner.style.top = "0px";

  if (category === 'world'){
    categoryUrlBase = `${CURRENTS_BASE}/v1/search?keywords=world&language=en&${COMMON_FILTERS}&apiKey=${CURRENTS_API_KEY}`;
  } else if (isCategory(category)){
    categoryUrlBase = `${CURRENTS_BASE}/v1/latest-news?category=${category}&language=en&${COMMON_FILTERS}&apiKey=${CURRENTS_API_KEY}`;
  } else {
    categoryUrlBase = `${CURRENTS_BASE}/v1/latest-news?language=en&${COMMON_FILTERS}&apiKey=${CURRENTS_API_KEY}`;
  }

  categoryPage = 1;
  fetchCategoryPage(1, false);
}

function fetchCategoryPage(page, append){
  fetch(`${categoryUrlBase}&page_number=${page}`, { cache: "no-store" })
    .then(r => r.json())
    .then(data => {
      if (!data.news){
        throw new Error(data.msg || (data.details && JSON.stringify(data.details)) || 'Unknown API error');
      }

      const news = data.news;
      categoryLastCount = news.length;
      categoryPage = page;

      if (append){
        currentList = currentList.concat(news);
      } else {
        currentList = news;
        currentIndex = 0;
      }

      listRenderer = renderArticleList;
      renderArticleList();
    })
    .catch(err => {
      if (!append){
        scrollInner.innerHTML = `<p>Error loading news: ${err.message || err}</p>`;
      }
    });
}

function loadMoreCategory(){
  fetchCategoryPage(categoryPage + 1, true);
}

function renderArticleList(){
  scrollInner.innerHTML = "";

  if (!currentList.length){
    scrollInner.innerHTML = "<p>No articles found.</p>";
    return;
  }

  currentList.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'ar-article';
    div.setAttribute("data-index", i);

    const imgHtml = a.image
      ? `<img 
           src="${a.image}" 
           loading="lazy"
           style="width:100%;border-radius:10px;opacity:0;transition:opacity .4s;"
           onload="this.style.opacity=1"
         >`
      : `<div class="img-placeholder"></div>`;

    div.innerHTML = `
      <div class="img-wrap">
        ${imgHtml}
      </div>

      <h3>${a.title || ''}</h3>
      <p>${a.description || ''}</p>

      <button class="open-btn" onclick="openArticleIndex(${i})">
        Open Article
      </button>
    `;

    scrollInner.appendChild(div);
  });

  if (categoryLastCount === PAGE_SIZE){
    const loadMoreDiv = document.createElement('div');
    loadMoreDiv.style.textAlign = 'center';
    loadMoreDiv.style.padding = '10px 0 20px';
    loadMoreDiv.innerHTML = `<button class="open-btn" onclick="loadMoreCategory()">Load More</button>`;
    scrollInner.appendChild(loadMoreDiv);
  }

  currentView = 'list';
  focusFirst();
}

function getArticleUrl(article){
  if (article.url) return article.url;
  const title = article.title || '';
  return 'https://news.google.com/search?q=' + encodeURIComponent(title);
}

function openArticleIndex(i){
  currentIndex = i;
  openArticleFull(currentList[i]);
}

function openArticleFull(article){
  scrollInner.style.transition = "opacity .25s ease";
  scrollInner.style.opacity = 0;
  setTimeout(() => {
    scrollInner.style.opacity = 1;
  }, 60);

  const articleUrl = getArticleUrl(article);

  scrollInner.innerHTML = `
    ${article.image ? 
      `<img src="${article.image}" 
            style="width:100%;border-radius:10px;margin-bottom:20px;">`
      : ''
    }

    <h2>${article.title || ''}</h2>
    <p>${article.description || ''}</p>

    <button class="open-btn" id="readMoreBtn" tabindex="0">
      Read More
    </button>
  `;

  document.getElementById('readMoreBtn').onclick = () => {
    openArticleReader(articleUrl, article);
  };

  currentView = 'article';
  currentArticleRef = article;
  focusFirst();
}

/* This platform blocks both top-level navigation away from the app AND
   iframing third-party sites directly, so "Read More" fetches the article's
   HTML server-side through the Worker (same trick as the news API) and
   injects it via srcdoc — that's DOM content arriving through our own
   fetch(), not a live navigation/frame to another origin, so it isn't
   subject to the same block. Some sites will still render awkwardly
   (scripts are disabled in the sandboxed frame for safety), but the
   readable text and images should come through. */
function openArticleReader(url, article){
  scrollInner.innerHTML = `
    <button class="open-btn" id="readerBack" tabindex="0">← Back</button>
    <p id="readerStatus" style="margin-top:14px;">Loading article…</p>
    <iframe
      id="readerFrame"
      sandbox="allow-same-origin"
      style="width:100%;height:65vh;border:none;border-radius:10px;margin-top:10px;background:#fff;display:none;"
    ></iframe>
  `;

  document.getElementById('readerBack').onclick = () => {
    openArticleFull(article);
  };

  fetch(`${CURRENTS_BASE}/article?url=${encodeURIComponent(url)}`, { cache: "no-store" })
    .then(r => r.text())
    .then(html => {
      const frame = document.getElementById('readerFrame');
      const status = document.getElementById('readerStatus');
      frame.srcdoc = html;
      frame.style.display = 'block';
      if (status) status.remove();
    })
    .catch(err => {
      const status = document.getElementById('readerStatus');
      if (status) status.textContent = "Couldn't load this article. Try Back and a different one.";
    });

  currentView = 'reader';
  focusFirst();
}

/* Swipe navigation */
let startX = 0;
let endX = 0;

scrollArea.onpointerdown = e => {
  startX = e.clientX;
};

scrollArea.onpointerup = e => {
  endX = e.clientX;
  const dx = endX - startX;

  if (dx > 80){
    if (currentIndex > 0){
      currentIndex--;
      openArticleFull(currentList[currentIndex]);
    }
  }

  if (dx < -80){
    if (currentIndex < currentList.length - 1){
      currentIndex++;
      openArticleFull(currentList[currentIndex]);
    }
  }
};

/* Momentum scroll */
let isScrolling = false;
let lastY = 0;
let velocity = 0;
let momentumFrame = null;

scrollArea.onpointerdown = e => {
  isScrolling = true;
  lastY = e.clientY;
  velocity = 0;
  cancelMomentum();
};

scrollArea.onpointermove = e => {
  if (!isScrolling) return;
  const dy = e.clientY - lastY;
  lastY = e.clientY;
  scrollInner.style.top = (scrollInner.offsetTop + dy) + 'px';
  velocity = dy;
};

scrollArea.onpointerup = e => {
  isScrolling = false;
  startMomentum();
};

function startMomentum(){
  const friction = 0.92;

  function momentum(){
    velocity *= friction;
    scrollInner.style.top = (scrollInner.offsetTop + velocity) + 'px';
    clampScroll();

    if (Math.abs(velocity) > 0.5){
      momentumFrame = requestAnimationFrame(momentum);
    }
  }

  momentum();
}

function cancelMomentum(){
  if (momentumFrame){
    cancelAnimationFrame(momentumFrame);
    momentumFrame = null;
  }
}

function clampScroll(){
  const maxScroll = 0;
  const minScroll = scrollArea.clientHeight - scrollInner.scrollHeight;

  let top = scrollInner.offsetTop;

  if (top > maxScroll) top = maxScroll;
  if (top < minScroll) top = minScroll;

  scrollInner.style.top = top + 'px';
}

/* Trending using Currents search */
function fetchTrending(){
  trendingUrlBase = `${CURRENTS_BASE}/v1/search?keywords=news&language=en&${COMMON_FILTERS}&apiKey=${CURRENTS_API_KEY}`;
  trendingPage = 1;
  fetchTrendingPage(1, false);
}

function fetchTrendingPage(page, append){
  fetch(`${trendingUrlBase}&page_number=${page}`, { cache: "no-store" })
    .then(r => r.json())
    .then(data => {
      if (!data.news){
        throw new Error(data.msg || (data.details && JSON.stringify(data.details)) || 'Unknown API error');
      }

      const news = data.news;
      trendingLastCount = news.length;
      trendingPage = page;

      if (append){
        trendingList = trendingList.concat(news);
        renderTrendingList();
      } else {
        trendingList = news;
        if (trendingList.length > 0){
          updateTrendingBar();
        } else {
          document.getElementById("trendingBar").textContent = "Trending: no data";
        }
      }
    })
    .catch(err => {
      if (!append){
        document.getElementById("trendingBar").textContent = "Trending: " + (err.message || err);
      }
    });
}

function loadMoreTrending(){
  fetchTrendingPage(trendingPage + 1, true);
}

function updateTrendingBar(){
  const bar = document.getElementById("trendingBar");
  if (!trendingList.length) return;

  bar.classList.add("update");

  setTimeout(() => {
    const item = trendingList[trendingIndex];
    trendingIndex = (trendingIndex + 1) % trendingList.length;

    bar.textContent = "Trending Now: " + (item.title || '');
    bar.classList.remove("update");
  }, 300);
}

function openTrending(){
  panel.classList.add('open');
  panelTitle.textContent = "TRENDING";
  scrollInner.style.top = "0px";
  listRenderer = renderTrendingList;
  renderTrendingList();
}

function renderTrendingList(){
  scrollInner.innerHTML = "";

  if (!trendingList.length){
    scrollInner.innerHTML = "<p>No trending articles.</p>";
    return;
  }

  trendingList.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'ar-article';
    div.innerHTML = `
      <h3>${a.title || ''}</h3>
      <p>${a.description || ''}</p>
      <button class="open-btn" onclick="openTrendingIndex(${i})">
        Open Article
      </button>
    `;
    scrollInner.appendChild(div);
  });

  if (trendingLastCount === PAGE_SIZE){
    const loadMoreDiv = document.createElement('div');
    loadMoreDiv.style.textAlign = 'center';
    loadMoreDiv.style.padding = '10px 0 20px';
    loadMoreDiv.innerHTML = `<button class="open-btn" onclick="loadMoreTrending()">Load More</button>`;
    scrollInner.appendChild(loadMoreDiv);
  }

  currentView = 'list';
  focusFirst();
}

function openTrendingIndex(i){
  currentList = trendingList;
  currentIndex = i;
  openArticleFull(trendingList[i]);
}

/* Breaking using Currents search */
function fetchBreaking(){
  breakingUrlBase = `${CURRENTS_BASE}/v1/search?keywords=breaking&language=en&${COMMON_FILTERS}&apiKey=${CURRENTS_API_KEY}`;
  breakingPage = 1;
  fetchBreakingPage(1, false);
}

function fetchBreakingPage(page, append){
  fetch(`${breakingUrlBase}&page_number=${page}`, { cache: "no-store" })
    .then(r => r.json())
    .then(data => {
      if (!data.news){
        throw new Error(data.msg || (data.details && JSON.stringify(data.details)) || 'Unknown API error');
      }

      const news = data.news;
      breakingLastCount = news.length;
      breakingPage = page;

      if (append){
        breakingList = breakingList.concat(news);
        renderBreakingList();
        return;
      }

      breakingList = news;
      const bar = document.getElementById("breakingBar");

      if (breakingList.length > 0){
        const headline = breakingList[0].title || '';
        bar.style.display = "block";
        bar.textContent = "BREAKING NEWS: " + headline;

        const lower = headline.toLowerCase();
        bar.classList.remove("critical");

        if (lower.includes("urgent") || lower.includes("alert")){
          bar.classList.add("critical");
        }
      } else {
        bar.style.display = "none";
      }
    })
    .catch(err => {
      if (!append){
        console.error("Breaking news error:", err.message || err);
        const bar = document.getElementById("breakingBar");
        bar.style.display = "none";
      }
    });
}

function loadMoreBreaking(){
  fetchBreakingPage(breakingPage + 1, true);
}

function openBreaking(){
  panel.classList.add('open');
  panelTitle.textContent = "BREAKING NEWS";
  scrollInner.style.top = "0px";
  listRenderer = renderBreakingList;
  renderBreakingList();
}

function renderBreakingList(){
  scrollInner.innerHTML = "";

  if (!breakingList.length){
    scrollInner.innerHTML = "<p>No breaking articles.</p>";
    return;
  }

  breakingList.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'ar-article';
    div.innerHTML = `
      <h3>${a.title || ''}</h3>
      <p>${a.description || ''}</p>
      <button class="open-btn" onclick="openBreakingIndex(${i})">
        Open Article
      </button>
    `;
    scrollInner.appendChild(div);
  });

  if (breakingLastCount === PAGE_SIZE){
    const loadMoreDiv = document.createElement('div');
    loadMoreDiv.style.textAlign = 'center';
    loadMoreDiv.style.padding = '10px 0 20px';
    loadMoreDiv.innerHTML = `<button class="open-btn" onclick="loadMoreBreaking()">Load More</button>`;
    scrollInner.appendChild(loadMoreDiv);
  }

  currentView = 'list';
  focusFirst();
}

function openBreakingIndex(i){
  currentList = breakingList;
  currentIndex = i;
  openArticleFull(breakingList[i]);
}

/* Close panel */
function closePanel(){
  panel.classList.remove('open');
}

/* Neural Band input: keydown only (no pointer/touch events on glasses).
   Up/Down move focus between selectable buttons (X, each article, Read More);
   pressing Enter on a focused <button> activates it natively.
   Left/Right still step between articles when one is open. */
function getFocusable(){
  return Array.from(panel.querySelectorAll('button, a.open-btn')).filter(el => el.offsetParent !== null);
}

function focusStep(direction){
  const focusables = getFocusable();
  if (!focusables.length) return;

  let idx = focusables.indexOf(document.activeElement);
  idx = (idx === -1) ? 0 : (idx + direction + focusables.length) % focusables.length;

  const el = focusables[idx];
  el.focus({ preventScroll: true });
  revealFocused(el);
}

function revealFocused(el){
  const areaRect = scrollArea.getBoundingClientRect();
  const elRect = el.getBoundingClientRect();

  if (elRect.top < areaRect.top){
    scrollInner.style.top = (scrollInner.offsetTop + (areaRect.top - elRect.top) + 16) + 'px';
    clampScroll();
  } else if (elRect.bottom > areaRect.bottom){
    scrollInner.style.top = (scrollInner.offsetTop - (elRect.bottom - areaRect.bottom) - 16) + 'px';
    clampScroll();
  }
}

function focusFirst(){
  const focusables = getFocusable();
  if (focusables.length) focusables[0].focus({ preventScroll: true });
}

document.addEventListener('keydown', (e) => {
  if (!panel.classList.contains('open')) return;

  if (e.key === 'ArrowDown'){
    e.preventDefault();
    cancelMomentum();
    focusStep(1);
  } else if (e.key === 'ArrowUp'){
    e.preventDefault();
    cancelMomentum();
    focusStep(-1);
  } else if (e.key === 'ArrowRight'){
    if (currentList.length && currentIndex < currentList.length - 1){
      currentIndex++;
      openArticleFull(currentList[currentIndex]);
    }
  } else if (e.key === 'ArrowLeft'){
    if (currentList.length && currentIndex > 0){
      currentIndex--;
      openArticleFull(currentList[currentIndex]);
    }
  } else if (e.key === 'Escape'){
    handleBack();
  }
});

/* Init: fetch trending + breaking once */
fetchTrending();
fetchBreaking();
</script>
