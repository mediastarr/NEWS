<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR News Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  padding:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:transparent;
  color:#fff;
  overflow:hidden;
}

/* Root container for tabs/home */
.ar-news-home{
  position:relative;
  padding:20px;
  z-index:1; /* tabs stay BELOW the panel */
}

.ar-title{
  font-size:24px;
  margin-bottom:16px;
}

/* Generic button style */
.open-btn{
  background:#444;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  margin-top:10px;
}

/* Trending Bar */
.trending-bar{
  background:#111;
  border:1px solid #333;
  padding:12px 16px;
  border-radius:10px;
  margin-bottom:20px;
  font-size:16px;
  color:#fff;
  cursor:pointer;
  transition:opacity .3s ease, transform .3s ease;
}

.trending-bar.update{
  opacity:0;
  transform:translateY(-6px);
}

/* Breaking News Alert */
.breaking-alert{
  background:#8b0000;
  border:2px solid #ff4444;
  padding:14px 18px;
  border-radius:12px;
  margin-bottom:20px;
  font-size:18px;
  color:#fff;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  animation:pulse 1.4s infinite ease-in-out;
}

@keyframes pulse{
  0%{transform:scale(1); opacity:1;}
  50%{transform:scale(1.03); opacity:.55;}
  100%{transform:scale(1); opacity:1;}
}

.breaking-alert::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,80,80,.35), transparent 70%);
  animation:glow 2.2s infinite ease-in-out;
  pointer-events:none;
}

@keyframes glow{
  0%{opacity:.2;}
  50%{opacity:.45;}
  100%{opacity:.2;}
}

.breaking-alert.critical{
  animation:shake .25s infinite;
}

@keyframes shake{
  0%{transform:translateX(0);}
  50%{transform:translateX(2px);}
  100%{transform:translateX(0);}
}

/* Category Grid */
.ar-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

.ar-card{
  background:transparent !important;
  border:1px solid rgba(255,255,255,.25);
  padding:20px;
  border-radius:14px;
  font-size:18px;
  text-align:center;
  cursor:pointer;
  color:#fff;
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  transform-style:preserve-3d;
}
</style>
</head>

<body>

<div class="ar-news-home" id="newsHome">
  <h1 class="ar-title">News</h1>

  <div id="trendingBar" class="trending-bar" onclick="openTrending()">
    Trending Now: Loading...
  </div>

  <div id="breakingBar" class="breaking-alert" style="display:none;" onclick="openBreaking()">
    BREAKING NEWS: Loading...
  </div>

  <div class="ar-grid">
    <button class="ar-card" onclick="openPanel('world')">🌍 World</button>
    <button class="ar-card" onclick="openPanel('business')">💼 Business</button>
    <button class="ar-card" onclick="openPanel('science')">🔬 Science</button>
    <button class="ar-card" onclick="openPanel('technology')">🖥️ Technology</button>
    <button class="ar-card" onclick="openPanel('entertainment')">🎬 Entertainment</button>
    <button class="ar-card" onclick="openPanel('sports')">🏆 Sports</button>
    <button class="ar-card" onclick="openPanel('health')">❤️ Health</button>
    <button class="ar-card" onclick="openPanel('politics')">🏛️ Politics</button>
  </div>
</div>
<style>
/* PANEL — now fully interactive and ABOVE tabs */
.ar-panel{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55); /* overlay so tabs disappear */
  backdrop-filter:blur(6px);
  padding:20px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:9999; /* critical fix */
  pointer-events:auto !important;
}

.ar-panel.open{display:flex;}

.ar-panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  background:transparent !important;
  pointer-events:auto !important;
}

#panelClose{
  background:#333;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
}

/* SCROLL AREA — patched for full interactivity */
.ar-scroll{
  flex:1;
  overflow:hidden;
  position:relative;
  background:transparent !important;
  pointer-events:auto !important;
  z-index:10000;
}

.ar-scroll-inner{
  position:absolute;
  left:0;right:0;top:0;
  padding-bottom:40px;
  background:transparent !important;
  pointer-events:auto !important;
  touch-action:none;
  user-select:none;
  min-height:100%; /* critical fix */
  z-index:10001;
}

/* ARTICLE — now clickable */
.ar-article{
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,.15);
  background:transparent !important;
  transform-style:preserve-3d;
  transition:transform .25s ease, box-shadow .25s ease;
  pointer-events:auto !important;
  z-index:10002;
}

.ar-article:hover{
  transform:translateZ(20px) scale(1.02);
  box-shadow:0 10px 20px rgba(0,0,0,.4);
}

.img-placeholder{
  width:100%;
  height:160px;
  background:#333;
  border-radius:10px;
  animation:pulse 1.4s infinite;
}

@keyframes pulse{
  0%{opacity:.6}
  50%{opacity:1}
  100%{opacity:.6}
}

/* CATEGORY THEMES */
.theme-world .ar-panel-header,
.theme-world .ar-article,
.theme-world .ar-card {
  border-color: rgba(0,120,255,.6);
  box-shadow: 0 0 22px rgba(0,120,255,.35);
}

.theme-business .ar-panel-header,
.theme-business .ar-article,
.theme-business .ar-card {
  border-color: rgba(255,200,0,.6);
  box-shadow: 0 0 22px rgba(255,200,0,.35);
}

.theme-science .ar-panel-header,
.theme-science .ar-article,
.theme-science .ar-card {
  border-color: rgba(180,0,255,.6);
  box-shadow: 0 0 22px rgba(180,0,255,.35);
}

.theme-technology .ar-panel-header,
.theme-technology .ar-article,
.theme-technology .ar-card {
  border-color: rgba(0,255,255,.6);
  box-shadow: 0 0 22px rgba(0,255,255,.35);
}

.theme-entertainment .ar-panel-header,
.theme-entertainment .ar-article,
.theme-entertainment .ar-card {
  border-color: rgba(255,0,150,.6);
  box-shadow: 0 0 22px rgba(255,0,150,.35);
}

.theme-sports .ar-panel-header,
.theme-sports .ar-article,
.theme-sports .ar-card {
  border-color: rgba(0,255,120,.6);
  box-shadow: 0 0 22px rgba(0,255,120,.35);
}

.theme-health .ar-panel-header,
.theme-health .ar-article,
.theme-health .ar-card {
  border-color: rgba(0,255,200,.6);
  box-shadow: 0 0 22px rgba(0,255,200,.35);
}

.theme-politics .ar-panel-header,
.theme-politics .ar-article,
.theme-politics .ar-card {
  border-color: rgba(255,60,60,.6);
  box-shadow: 0 0 22px rgba(255,60,60,.35);
}
</style>

<div class="ar-panel" id="newsPanel">
  <div class="ar-panel-header">
    <span id="panelTitle"></span>
    <button id="panelClose" onclick="closePanel()">✕</button>
  </div>

  <div class="ar-scroll" id="scrollArea">
    <div class="ar-scroll-inner" id="scrollInner"></div>
  </div>
</div>
<script>
/* Panel + DOM references */
const panel = document.getElementById('newsPanel');
const panelTitle = document.getElementById('panelTitle');
const scrollArea = document.getElementById('scrollArea');
const scrollInner = document.getElementById('scrollInner');

/* Your NewsData.io API key */
const NEWS_API_KEY = "pub_17925833bb71458d99ad2408f2042a93";

/* Active category + timers */
let activeCategory = null;
let categoryTimer = null;

/* Trending system */
let trendingIndex = 0;
let trendingList = [];

/* Article navigation */
let currentIndex = 0;
let currentList = [];
</script>
<script>
function openPanel(category){
  activeCategory = category;

  /* Apply category glow theme */
  document.body.className = "";
  document.body.classList.add("theme-" + category);

  /* Reset auto-refresh timer */
  if (categoryTimer){
    clearInterval(categoryTimer);
  }

  categoryTimer = setInterval(() => {
    refreshCategory(category);
  }, 20000);

  /* Open panel */
  panel.classList.add('open');
  panelTitle.textContent = category.toUpperCase();
  scrollInner.innerHTML = '<p>Loading...</p>';

  /* Fetch category articles */
  fetch(`https://newsdata.io/api/1/news?apikey=${NEWS_API_KEY}&category=${category}`)
    .then(r => r.json())
    .then(data => {
      currentList = data.results || [];
      currentIndex = 0;
      scrollInner.style.top = "0px";
      renderArticleList();
    });
}

function renderArticleList(){
  scrollInner.innerHTML = "";

  currentList.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'ar-article';
    div.setAttribute("data-index", i);

    div.innerHTML = `
      <div class="img-wrap">
        ${a.image_url ? `
          <img 
            src="${a.image_url}" 
            loading="lazy"
            style="width:100%;border-radius:10px;opacity:0;transition:opacity .4s;"
            onload="this.style.opacity=1"
          >
        ` : `<div class="img-placeholder"></div>`}
      </div>

      <h3>${a.title}</h3>
      <p>${a.description || ''}</p>

      <button class="open-btn" onclick="openArticleIndex(${i})">
        Open Article
      </button>
    `;

    scrollInner.appendChild(div);
  });
}
</script>
<script>
function openArticleIndex(i){
  currentIndex = i;
  openArticle(currentList[i]);
}

function openArticle(article){
  /* 3D pop animation */
  scrollInner.style.transition = "transform .35s ease";
  scrollInner.style.transform = "perspective(900px) translateZ(40px)";
  setTimeout(() => {
    scrollInner.style.transform = "perspective(900px) translateZ(0px)";
  }, 200);

  /* Render article */
  scrollInner.innerHTML = `
    ${article.image_url ? 
      `<img src="${article.image_url}" 
            style="width:100%;border-radius:10px;margin-bottom:20px;">`
      : ''
    }

    <h2>${article.title}</h2>
    <p>${article.content || article.description || ''}</p>

    <button class="open-btn" onclick="window.open('${article.link}', '_blank')">
      Read More
    </button>
  `;
}

/* Swipe left/right navigation */
let startX = 0;
let endX = 0;

scrollArea.onpointerdown = e => {
  startX = e.clientX;
};

scrollArea.onpointerup = e => {
  endX = e.clientX;
  const dx = endX - startX;

  /* Swipe right → previous article */
  if (dx > 80){
    if (currentIndex > 0){
      currentIndex--;
      openArticle(currentList[currentIndex]);
    }
  }

  /* Swipe left → next article */
  if (dx < -80){
    if (currentIndex < currentList.length - 1){
      currentIndex++;
      openArticle(currentList[currentIndex]);
    }
  }
};
</script>
<script>
let isScrolling = false;
let lastY = 0;
let velocity = 0;
let momentumFrame = null;

/* Pointer down: begin drag */
scrollArea.onpointerdown = e => {
  isScrolling = true;
  lastY = e.clientY;
  velocity = 0;
  cancelMomentum();
};

/* Pointer move: drag scroll */
scrollArea.onpointermove = e => {
  if (!isScrolling) return;
  const dy = e.clientY - lastY;
  lastY = e.clientY;
  scrollInner.style.top = (scrollInner.offsetTop + dy) + 'px';
  velocity = dy;
};

/* Pointer up: release and start momentum */
scrollArea.onpointerup = e => {
  isScrolling = false;
  startMomentum();
};

/* Momentum physics */
function startMomentum(){
  const friction = 0.92;

  function momentum(){
    velocity *= friction;
    scrollInner.style.top = (scrollInner.offsetTop + velocity) + 'px';
    clampScroll();

    if (Math.abs(velocity) > 0.5){
      momentumFrame = requestAnimationFrame(momentum);
    }
  }

  momentum();
}

/* Cancel momentum */
function cancelMomentum(){
  if (momentumFrame){
    cancelAnimationFrame(momentumFrame);
    momentumFrame = null;
  }
}

/* Prevent scrolling past top/bottom */
function clampScroll(){
  const maxScroll = 0;
  const minScroll = scrollArea.clientHeight - scrollInner.scrollHeight;

  let top = scrollInner.offsetTop;

  if (top > maxScroll) top = maxScroll;
  if (top < minScroll) top = minScroll;

  scrollInner.style.top = top + 'px';
}
</script>
<script>
/* Fetch trending headlines */
function fetchTrending(){
  fetch(`https://newsdata.io/api/1/news?apikey=${NEWS_API_KEY}&category=top`)
    .then(r => r.json())
    .then(data => {
      trendingList = data.results || [];
      if(trendingList.length > 0){
        updateTrendingBar();
      }
    });
}

/* Animate trending bar updates */
function updateTrendingBar(){
  const bar = document.getElementById("trendingBar");
  bar.classList.add("update");

  setTimeout(() => {
    const item = trendingList[trendingIndex];
    trendingIndex = (trendingIndex + 1) % trendingList.length;

    bar.textContent = "Trending Now: " + item.title;
    bar.classList.remove("update");
  }, 300);
}

/* Open trending panel */
function openTrending(){
  panel.classList.add('open');
  panelTitle.textContent = "TRENDING";
  scrollInner.innerHTML = "";
  scrollInner.style.top = "0px";

  trendingList.forEach(a => {
    const div = document.createElement('div');
    div.className = 'ar-article';
    div.innerHTML = `
      <h3>${a.title}</h3>
      <p>${a.description || ''}</p>
      <button class="open-btn" onclick="openArticle(${JSON.stringify(a).replace(/"/g,'&quot;')})">
        Open Article
      </button>
    `;
    scrollInner.appendChild(div);
  });
}

/* Fetch breaking news */
function fetchBreaking(){
  fetch(`https://newsdata.io/api/1/news?apikey=${NEWS_API_KEY}&category=top`)
    .then(r => r.json())
    .then(data => {
      const breaking = data.results?.filter(a =>
        (a.title || "").toLowerCase().includes("breaking") ||
        (a.description || "").toLowerCase().includes("breaking") ||
        (a.content || "").toLowerCase().includes("breaking") ||
        (a.title || "").toLowerCase().includes("urgent") ||
        (a.title || "").toLowerCase().includes("alert") ||
        (a.title || "").toLowerCase().includes("live")
      );

      const bar = document.getElementById("breakingBar");

      if (breaking && breaking.length > 0){
        const headline = breaking[0].title;
        bar.style.display = "block";
        bar.textContent = "BREAKING NEWS: " + headline;

        const lower = headline.toLowerCase();
        bar.classList.remove("critical");

        if (lower.includes("urgent") || lower.includes("alert")){
          bar.classList.add("critical");
        }

        window.breakingList = breaking;
      } else {
        bar.style.display = "none";
      }
    });
}

/* Open breaking news panel */
function openBreaking(){
  panel.classList.add('open');
  panelTitle.textContent = "BREAKING NEWS";
  scrollInner.innerHTML = "";
  scrollInner.style.top = "0px";

  window.breakingList.forEach(a => {
    const div = document.createElement('div');
    div.className = 'ar-article';
    div.innerHTML = `
      <h3>${a.title}</h3>
      <p>${a.description || ''}</p>
      <button class="open-btn" onclick="openArticle(${JSON.stringify(a).replace(/"/g,'&quot;')})">
        Open Article
      </button>
    `;
    scrollInner.appendChild(div);
  });
}
</script>
<script>
/* Refresh category every 20 seconds */
function refreshCategory(category){
  if (!panel.classList.contains("open")) return;
  if (activeCategory !== category) return;

  fetch(`https://newsdata.io/api/1/news?apikey=${NEWS_API_KEY}&category=${category}`)
    .then(r => r.json())
    .then(data => {
      currentList = data.results || [];
      scrollInner.style.top = "0px";
      renderArticleList();
    });
}

/* Close panel */
function closePanel(){
  panel.classList.remove('open');
}
</script>
<script>
/* Start trending auto-refresh */
fetchTrending();
setInterval(fetchTrending, 30000);

/* Start breaking news auto-refresh */
fetchBreaking();
setInterval(fetchBreaking, 15000);

/* Ensure scroll starts at top when panel opens */
panel.addEventListener("transitionend", () => {
  scrollInner.style.top = "0px";
});
</script>
<script>
function openArticle(article){
  scrollInner.style.transition = "transform .35s ease";
  scrollInner.style.transform = "perspective(900px) translateZ(40px)";
  setTimeout(() => {
    scrollInner.style.transform = "perspective(900px) translateZ(0px)";
  }, 200);

  scrollInner.innerHTML = `
    ${article.image_url ? 
      `<img src="${article.image_url}" 
            style="width:100%;border-radius:10px;margin-bottom:20px;">`
      : ''
    }

    <h2>${article.title}</h2>
    <p>${article.content || article.description || ''}</p>

    <button class="open-btn" onclick="window.open('${article.link}', '_blank')">
      Read More
    </button>
  `;
}
</script>
</body>
</html>
