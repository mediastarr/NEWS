<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AR Web Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="ar-root">
    <div id="browser-shell" class="depth-layer-shell">
      <div id="url-bar" class="depth-layer-url">
        <button id="btn-back">←</button>
        <input id="url-input" type="text" placeholder="Enter URL" />
        <button id="btn-go">Go</button>
      </div>

      <div id="tab-strip" class="depth-layer-tabs">
        <div id="tabs-container"></div>
        <button id="btn-new-tab">+</button>
      </div>

      <div id="content-frame" class="depth-layer-content">
        <div id="frames-container"></div>
      </div>

      <div id="scroll-indicator" class="depth-layer-hud">
        <span>Scroll: wrist rotation · Click: pinch · Back: double pinch</span>
      </div>
    </div>
  </div>

  <div id="mini-player" class="depth-layer-mini hidden">
    <div id="mini-header">
      <span id="mini-title">Mini Player</span>
      <button id="mini-close">×</button>
    </div>
    <div id="mini-body">
      <video id="mini-video" controls></video>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="mini-player.js"></script>
  <script src="gestures.js"></script>
</body>
</html>
